<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#333;font-size:13px}
.header{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:22px 28px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px}
.header p{font-size:12px;opacity:.8;margin-top:3px}
.container{max-width:1500px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;background:#fff;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;border-bottom:3px solid transparent;transition:.2s}
.tab.active{background:#0d47a1;color:#fff;border-bottom-color:#ff6f00}
.tab:hover:not(.active){background:#e3f2fd}
.panel{display:none}.panel.active{display:block}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #0d47a1;position:relative}
.card .lb{font-size:12px;color:#666;margin-bottom:4px}
.card .vl{font-size:26px;font-weight:700;color:#0d47a1}
.card .sub{font-size:11px;color:#888;margin-top:4px}
.card.accent{border-left-color:#e65100}.card.accent .vl{color:#e65100}
.card.green{border-left-color:#2e7d32}.card.green .vl{color:#2e7d32}

/* Chart area */
.chart-section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px}
.chart-section h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#333}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{min-width:180px;font-size:12px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:26px;background:#f0f0f0;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:600;color:#fff;transition:width .5s;min-width:40px}
.bar-fill.gov{background:linear-gradient(90deg,#1565c0,#42a5f5)}
.bar-fill.cash{background:linear-gradient(90deg,#e65100,#ff9800)}
.bar-fill.kind{background:linear-gradient(90deg,#2e7d32,#66bb6a)}
.bar-fill.total{background:linear-gradient(90deg,#37474f,#78909c)}
.bar-value{min-width:100px;font-size:12px;font-weight:600;text-align:right;color:#333}

/* Stacked bar */
.stacked-track{flex:1;height:30px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex}
.stacked-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:width .5s}
.seg-gov{background:#1565c0}
.seg-cash{background:#ff9800}
.seg-kind{background:#66bb6a}

/* Table */
.tbl-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
thead th{background:#f5f5f5;padding:10px 8px;text-align:center;font-weight:600;color:#444;border-bottom:2px solid #ddd;position:sticky;top:0}
thead th.gh{background:#e3f2fd;font-size:13px}
tbody td{padding:8px;text-align:center;border-bottom:1px solid #eee}
tbody tr:hover{background:#f8f9ff}
td.left{text-align:left;font-weight:600}
td.right{text-align:right}
.total-row{background:#e3f2fd !important;font-weight:700}
.subtotal-row{background:#f5f5f5 !important;font-weight:700}

/* Year chart */
.year-chart{display:flex;align-items:flex-end;gap:6px;height:200px;padding:10px 0}
.year-col{display:flex;flex-direction:column;align-items:center;flex:1}
.year-bar-wrap{width:100%;display:flex;flex-direction:column;align-items:center;height:180px;justify-content:flex-end}
.year-bar{width:40px;border-radius:4px 4px 0 0;transition:height .5s;position:relative}
.year-bar.rd{background:linear-gradient(180deg,#1565c0,#42a5f5)}
.year-bar.sp{background:linear-gradient(180deg,#e65100,#ff9800)}
.year-bar-label{font-size:10px;font-weight:600;color:#333;margin-bottom:2px}
.year-label{font-size:12px;font-weight:600;margin-top:4px;color:#555}

.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#666;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:2px}
.filter-bar{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select{padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:12px;font-family:inherit}
.filter-bar label{font-size:12px;font-weight:600;color:#555}
.footer{text-align:center;color:#999;font-size:11px;padding:20px}

/* Donut */
.donut-container{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.donut-wrap{text-align:center}
.donut-wrap h4{font-size:13px;margin-bottom:8px;color:#555}
svg.donut{width:180px;height:180px}
.donut-center{font-size:14px;font-weight:700;fill:#333}
.donut-sub{font-size:10px;fill:#888}
</style>

// ═══ HELPERS ═══
function getYear(dateStr){ return dateStr?parseInt(dateStr.substring(0,4)):0; }
function yearRange(p){ return [getYear(p.start), getYear(p.end)]; }

function showTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

// ═══ TAB 0: OVERVIEW ═══
function renderOverview(){
  const rd=projects.filter(p=>p.type==='R&D');
  const sp=projects.filter(p=>p.type==='지원');
  const totalGov=projects.reduce((s,p)=>s+p.gov,0);
  const totalCash=projects.reduce((s,p)=>s+p.cash,0);
  const totalKind=projects.reduce((s,p)=>s+p.kind,0);
  const totalAll=projects.reduce((s,p)=>s+p.total,0);
  const rdGov=rd.reduce((s,p)=>s+p.gov,0);
  const spGov=sp.reduce((s,p)=>s+p.gov,0);
  const rdTotal=rd.reduce((s,p)=>s+p.total,0);
  const spTotal=sp.reduce((s,p)=>s+p.total,0);

  let html=`<div class="cards">
    <div class="card"><div class="lb">총 과제 수</div><div class="vl">${projects.length}건</div><div class="sub">R&D ${rd.length}건 / 지원사업 ${sp.length}건</div></div>
    <div class="card"><div class="lb">정부출연금 누적</div><div class="vl">${fmtB(totalGov)}원</div><div class="sub">R&D ${fmtB(rdGov)} / 지원 ${fmtB(spGov)}</div></div>
    <div class="card accent"><div class="lb">민간부담금 (현금+현물)</div><div class="vl">${fmtB(totalCash+totalKind)}원</div><div class="sub">현금 ${fmtB(totalCash)} / 현물 ${fmtB(totalKind)}</div></div>
    <div class="card green"><div class="lb">총 사업비 누적</div><div class="vl">${fmtB(totalAll)}원</div><div class="sub">R&D ${fmtB(rdTotal)} / 지원 ${fmtB(spTotal)}</div></div>
  </div>`;

  // Donut charts
  html+=`<div class="chart-section"><h3>자금 구성 비율</h3><div class="donut-container">`;
  html+=makeDonut('정부출연금 비중',[{label:'R&D',val:rdGov,color:'#1565c0'},{label:'지원',val:spGov,color:'#ff9800'}]);
  html+=makeDonut('총사업비 구성',[{label:'정부',val:totalGov,color:'#1565c0'},{label:'현금',val:totalCash,color:'#ff9800'},{label:'현물',val:totalKind,color:'#66bb6a'}]);
  html+=makeDonut('총사업비 유형',[{label:'R&D',val:rdTotal,color:'#1565c0'},{label:'지원',val:spTotal,color:'#ff9800'}]);
  html+=`</div></div>`;

  // Top 10 projects by gov funding
  html+=`<div class="chart-section"><h3>정부출연금 TOP 10 과제</h3><div class="bar-chart">`;
  const top10=[...projects].sort((a,b)=>b.gov-a.gov).slice(0,10);
  const maxGov=top10[0].gov;
  top10.forEach(p=>{
    const pct=p.gov/maxGov*100;
    html+=`<div class="bar-row">
      <div class="bar-label">${p.name.length>25?p.name.substring(0,25)+'…':p.name}</div>
      <div class="bar-track"><div class="bar-fill ${p.type==='R&D'?'gov':'cash'}" style="width:${pct}%">${fmtB(p.gov)}</div></div>
      <div class="bar-value">[${p.type}]</div>
    </div>`;
  });
  html+=`</div><div class="legend" style="margin-top:10px">
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>R&D과제</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>지원사업</div>
  </div></div>`;

  document.getElementById('panel0').innerHTML=html;
}

function makeDonut(title, segments){
  const total=segments.reduce((s,seg)=>s+seg.val,0);
  let html=`<div class="donut-wrap"><h4>${title}</h4><svg class="donut" viewBox="0 0 42 42">
    <circle cx="21" cy="21" r="15.9" fill="transparent" stroke="#eee" stroke-width="5"/>`;
  let offset=25;
  segments.forEach(seg=>{
    const pct=seg.val/total*100;
    const dash=pct*100/100;
    html+=`<circle cx="21" cy="21" r="15.9" fill="transparent" stroke="${seg.color}" stroke-width="5" stroke-dasharray="${dash} ${100-dash}" stroke-dashoffset="${-offset}" stroke-linecap="round"/>`;
    offset-=dash;
  });
  html+=`<text x="21" y="20" class="donut-center" text-anchor="middle">${fmtB(total)}</text>
    <text x="21" y="24.5" class="donut-sub" text-anchor="middle">원</text></svg>`;
  html+=`<div style="font-size:11px;color:#666">`;
  segments.forEach(seg=>{
    html+=`<span style="color:${seg.color};font-weight:600">${seg.label}</span> ${(seg.val/total*100).toFixed(1)}% `;
  });
  html+=`</div></div>`;
  return html;
}

// ═══ TAB 1 & 2: R&D / Support ═══
function renderTypeTab(type, panelId){
  const items=projects.filter(p=>p.type===type);
  const totalGov=items.reduce((s,p)=>s+p.gov,0);
  const totalCash=items.reduce((s,p)=>s+p.cash,0);
  const totalKind=items.reduce((s,p)=>s+p.kind,0);
  const totalAll=items.reduce((s,p)=>s+p.total,0);

  let html=`<div class="cards">
    <div class="card"><div class="lb">${type} 과제 수</div><div class="vl">${items.length}건</div></div>
    <div class="card"><div class="lb">정부출연금</div><div class="vl">${fmtB(totalGov)}원</div></div>
    <div class="card accent"><div class="lb">민간부담금</div><div class="vl">${fmtB(totalCash+totalKind)}원</div></div>
    <div class="card green"><div class="lb">총사업비</div><div class="vl">${fmtB(totalAll)}원</div></div>
  </div>`;

  // Status summary
  const now=new Date();
  const active=items.filter(p=>new Date(p.end)>=now);
  const completed=items.filter(p=>new Date(p.end)<now);
  html+=`<div class="legend" style="margin-bottom:14px">
    <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>진행중 ${active.length}건</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9e9e9e"></div>완료 ${completed.length}건</div>
  </div>`;

  // Table
  html+=`<div class="tbl-wrap"><table><thead>
    <tr><th>#</th><th>과제명</th><th>주관기관</th><th>기간</th><th>상태</th><th>정부출연금</th><th>민간(현금)</th><th>민간(현물)</th><th>총사업비</th><th>책임자</th></tr>
  </thead><tbody>`;
  const sorted=[...items].sort((a,b)=>new Date(b.start)-new Date(a.start));
  sorted.forEach((p,i)=>{
    const isActive=new Date(p.end)>=now;
    const status=isActive?'<span style="color:#2e7d32;font-weight:700">진행중</span>':'<span style="color:#999">완료</span>';
    html+=`<tr>
      <td>${i+1}</td>
      <td class="left" style="max-width:300px;white-space:normal">${p.name}</td>
      <td style="max-width:150px;white-space:normal">${p.org}</td>
      <td>${p.start.substring(2)}~${p.end.substring(2)}</td>
      <td>${status}</td>
      <td class="right">${fmt(p.gov)}</td>
      <td class="right">${p.cash?fmt(p.cash):'-'}</td>
      <td class="right">${p.kind?fmt(p.kind):'-'}</td>
      <td class="right" style="font-weight:600">${fmt(p.total)}</td>
      <td>${p.pi}</td>
    </tr>`;
  });
  html+=`<tr class="total-row"><td colspan="5">합계</td>
    <td class="right">${fmt(totalGov)}</td><td class="right">${fmt(totalCash)}</td>
    <td class="right">${fmt(totalKind)}</td><td class="right">${fmt(totalAll)}</td><td></td></tr>`;
  html+=`</tbody></table></div>`;

  document.getElementById(panelId).innerHTML=html;
}

// ═══ TAB 3: YEARLY TRENDS ═══
function renderYearlyTrends(){
  const years=[2020,2021,2022,2023,2024,2025,2026,2027];
  const yearData=years.map(y=>{
    // Projects that started in this year
    const started=projects.filter(p=>getYear(p.start)===y);
    const rdStarted=started.filter(p=>p.type==='R&D');
    const spStarted=started.filter(p=>p.type==='지원');
    return {
      year:y,
      rdGov:rdStarted.reduce((s,p)=>s+p.gov,0),
      spGov:spStarted.reduce((s,p)=>s+p.gov,0),
      rdTotal:rdStarted.reduce((s,p)=>s+p.total,0),
      spTotal:spStarted.reduce((s,p)=>s+p.total,0),
      rdCount:rdStarted.length,
      spCount:spStarted.length,
      totalGov:started.reduce((s,p)=>s+p.gov,0),
      totalAll:started.reduce((s,p)=>s+p.total,0)
    };
  });

  // Cumulative
  let cumGov=0,cumTotal=0;
  yearData.forEach(yd=>{cumGov+=yd.totalGov;cumTotal+=yd.totalAll;yd.cumGov=cumGov;yd.cumTotal=cumTotal;});

  const maxGov=Math.max(...yearData.map(d=>d.totalGov));

  let html=`<div class="chart-section"><h3>연도별 신규 확보 자금 (정부출연금 기준, 과제 시작 연도 기준)</h3>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>R&D과제</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>지원사업</div>
  </div>
  <div style="display:flex;align-items:flex-end;gap:12px;height:220px;padding:20px 0;border-bottom:2px solid #ddd">`;
  yearData.forEach(yd=>{
    const rdH=maxGov>0?yd.rdGov/maxGov*180:0;
    const spH=maxGov>0?yd.spGov/maxGov*180:0;
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
      <div style="font-size:10px;font-weight:600;color:#333;margin-bottom:2px">${fmtB(yd.totalGov)}</div>
      <div style="display:flex;gap:2px;align-items:flex-end">
        <div style="width:20px;height:${rdH}px;background:linear-gradient(180deg,#1565c0,#42a5f5);border-radius:3px 3px 0 0"></div>
        <div style="width:20px;height:${spH}px;background:linear-gradient(180deg,#e65100,#ff9800);border-radius:3px 3px 0 0"></div>
      </div>
      <div style="font-size:12px;font-weight:600;margin-top:6px;color:#555">${yd.year}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Cumulative line (as table)
  html+=`<div class="chart-section"><h3>누적 추이</h3>
  <div class="tbl-wrap"><table><thead><tr><th>연도</th>${years.map(y=>`<th>${y}</th>`).join('')}</tr></thead><tbody>
  <tr><td class="left" style="font-weight:700">신규 과제 수</td>${yearData.map(d=>`<td>${d.rdCount+d.spCount}건</td>`).join('')}</tr>
  <tr><td class="left" style="font-weight:700">신규 정부출연금</td>${yearData.map(d=>`<td class="right">${fmtB(d.totalGov)}</td>`).join('')}</tr>
  <tr><td class="left" style="font-weight:700">신규 총사업비</td>${yearData.map(d=>`<td class="right">${fmtB(d.totalAll)}</td>`).join('')}</tr>
  <tr class="total-row"><td class="left">누적 정부출연금</td>${yearData.map(d=>`<td class="right">${fmtB(d.cumGov)}</td>`).join('')}</tr>
  <tr class="total-row"><td class="left">누적 총사업비</td>${yearData.map(d=>`<td class="right">${fmtB(d.cumTotal)}</td>`).join('')}</tr>
  </tbody></table></div></div>`;

  // Cumulative bar chart
  const maxCum=yearData[yearData.length-1].cumTotal;
  html+=`<div class="chart-section"><h3>누적 총사업비 그래프</h3><div class="bar-chart">`;
  yearData.forEach(yd=>{
    const pct=maxCum>0?yd.cumTotal/maxCum*100:0;
    html+=`<div class="bar-row">
      <div class="bar-label">${yd.year}년</div>
      <div class="bar-track"><div class="bar-fill total" style="width:${pct}%">${fmtB(yd.cumTotal)}</div></div>
      <div class="bar-value">${yd.rdCount+yd.spCount}건</div>
    </div>`;
  });
  html+=`</div></div>`;

  document.getElementById('panel3').innerHTML=html;
}
