<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무관리 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f7f6fb;color:#3a3a4a;font-size:13px}
.header{background:linear-gradient(135deg,#7c83c9,#a0b4f0);color:#fff;padding:20px 28px;box-shadow:0 2px 8px rgba(124,131,201,.25)}
.header h1{font-size:22px}
.header p{font-size:12px;opacity:.8;margin-top:3px}
.container{max-width:1500px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;background:#fff;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;border-bottom:3px solid transparent;transition:.2s}
.tab.active{background:#8b93d1;color:#fff;border-bottom-color:#f4a8c1}
.tab:hover:not(.active){background:#ede7f6}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #b0b7e8;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.card.green{border-left-color:#a5d6b0}
.card.blue{border-left-color:#a0c4f0}
.card.red{border-left-color:#f0a0a0}
.card.orange{border-left-color:#f5c89a}
.card .lb{font-size:12px;color:#888;margin-bottom:4px}
.card .vl{font-size:28px;font-weight:700}
.card.green .vl{color:#5cb878}
.card.blue .vl{color:#6ba3d6}
.card.red .vl{color:#d97070}
.card.orange .vl{color:#e0935a}

/* Card tooltip */
.card-tooltip{display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);padding:12px;margin-top:6px;font-size:11px;max-height:250px;overflow-y:auto;min-width:220px;width:max-content;max-width:350px}
.card:hover .card-tooltip{display:block}
.card-tooltip .tt-title{font-weight:700;font-size:12px;color:#555;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px}
.card-tooltip .tt-item{padding:3px 0;color:#444;line-height:1.5;border-bottom:1px solid #f8f8f8}
.card-tooltip .tt-item:last-child{border-bottom:none}
.card-tooltip .tt-empty{color:#bbb;font-style:italic}

/* Section */
.section-title{font-size:15px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.chart-section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px}
.chart-section h3{font-size:14px;font-weight:700;margin-bottom:14px;color:#333}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{min-width:70px;font-size:12px;font-weight:600;text-align:right}
.bar-track{flex:1;height:24px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:width .5s;min-width:0}
.bar-seg.s-done{background:#8fd4a4}
.bar-seg.s-prog{background:#8ec5f0}
.bar-seg.s-late{background:#f0a0a0}
.bar-seg.s-warn{background:#f5c89a}
.bar-seg.s-todo{background:#d5d5d5}
.bar-value{min-width:40px;font-size:12px;font-weight:600;text-align:left}

/* Pie chart via CSS conic-gradient */
.pie-container{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center}
.pie{width:180px;height:180px;border-radius:50%;position:relative}
.pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#333}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.pie-legend-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* Controls */
.ctrl{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ctrl label{font-size:12px;font-weight:600;color:#555}
.ctrl select{padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:12px;font-family:inherit}

/* Table */
.tbl-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
thead th{background:#f5f5f5;padding:8px 6px;text-align:center;font-weight:600;color:#444;border-bottom:2px solid #ddd;position:sticky;top:0;z-index:2}
tbody td{padding:6px 8px;text-align:center;border-bottom:1px solid #eee}
tbody tr:hover{background:#f8f9ff}
td.left{text-align:left}

/* Status badges */
.badge-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-done{background:#ddf3e4;color:#4a9c6b}
.badge-prog{background:#ddeaf7;color:#5a8fbe}
.badge-late{background:#fce0e0;color:#c06060}
.badge-warn{background:#fdecd5;color:#c08050}
.badge-todo{background:#f0f0f0;color:#aaa}

/* Group header row */
.group-header-row td{background:#ede7f6;color:#7c6bbd;font-weight:700;font-size:13px;padding:10px 12px!important;border-bottom:2px solid #d1c4e9;letter-spacing:0.5px}

/* Priority badges */
.badge-pri{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;position:relative}
.badge-p1{background:#fce0e0;color:#c06060}
.badge-p2{background:#fdecd5;color:#c08050}
.badge-p3{background:#ddeaf7;color:#5a8fbe}
.badge-p4{background:#f0f0f0;color:#888}

/* Priority dropdown */
.pri-dropdown{position:absolute;top:100%;left:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100;min-width:80px;overflow:hidden}
.pri-dropdown div{padding:6px 12px;font-size:11px;cursor:pointer;font-weight:600}
.pri-dropdown div:hover{background:#ede7f6}

/* Progress bar */
.prog-bar{width:80px;height:8px;background:#eee;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-fill.pf-done{background:#8fd4a4}
.prog-fill.pf-mid{background:#8ec5f0}
.prog-fill.pf-low{background:#f5c89a}
.prog-fill.pf-zero{background:#eee}

/* KPI */
.kpi-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;border-left:4px solid #b0b7e8}
.kpi-card h3{font-size:15px;margin-bottom:4px;color:#6a72b0}
.kpi-card .kpi-weight{font-size:12px;color:#666;margin-bottom:12px}
.kpi-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;font-size:12px}
.kpi-meta dt{font-weight:700;color:#555}
.kpi-meta dd{color:#333;margin-bottom:6px}
.kpi-steps{margin-bottom:14px}
.kpi-steps h4{font-size:12px;font-weight:700;margin-bottom:6px;color:#555}
.kpi-steps li{font-size:12px;margin-bottom:3px;padding-left:4px;list-style:none}
.kpi-steps li:before{content:'';display:inline-block;width:6px;height:6px;background:#b0b7e8;border-radius:50%;margin-right:6px;vertical-align:middle}
.grade-table{width:100%;border-collapse:collapse;font-size:11px}
.grade-table th,.grade-table td{border:1px solid #ddd;padding:6px 8px;text-align:center}
.grade-table th{background:#f5f5f5;font-weight:700}
.grade-table td:first-child{font-weight:700;width:40px}
.grade-s{background:#ddf3e4;color:#5cb878}
.grade-a{background:#ddeaf7;color:#6ba3d6}
.grade-b{background:#fff8e1;color:#f57f17}
.grade-c{background:#fdecd5;color:#c08050}
.grade-d{background:#fce0e0;color:#c06060}
.grade-scale{display:flex;gap:0;margin-bottom:18px;border-radius:8px;overflow:hidden}
.grade-scale div{flex:1;text-align:center;padding:8px 4px;font-weight:700;font-size:13px;color:#fff}

/* Weekly report */
.report-section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px}
.report-section h3{font-size:15px;font-weight:700;color:#6a72b0;margin-bottom:4px;border-bottom:2px solid #b0b7e8;padding-bottom:6px}
.report-section h4{font-size:13px;font-weight:700;color:#333;margin:12px 0 6px;padding-left:4px;border-left:3px solid #b0b7e8}
.report-item{font-size:12px;padding:4px 0 4px 16px;line-height:1.6;border-bottom:1px solid #f5f5f5}
.report-item:last-child{border-bottom:none}
.report-highlight{background:#fef3e8;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:12px;border-left:3px solid #f5c89a}
.report-date{font-size:12px;color:#666;margin-bottom:12px}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:.2s}
.btn-primary{background:#8b93d1;color:#fff}.btn-primary:hover{background:#7c83c9}
.btn-print{background:#e0935a;color:#fff;margin-left:10px}.btn-print:hover{background:#c97d48}

/* Task list collapsible completed section */
.task-section-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#f9f7fc;border-radius:8px;margin-bottom:10px;cursor:pointer;user-select:none;font-weight:700;font-size:14px;color:#6a72b0;transition:background .2s}
.task-section-header:hover{background:#ede7f6}
.task-section-header .tsh-arrow{font-size:12px;color:#aaa;transition:transform .2s}
.task-section-header.collapsed .tsh-arrow{transform:rotate(-90deg)}
.task-section-header .tsh-count{font-size:12px;font-weight:400;color:#999;margin-left:4px}
.task-section-body{overflow:hidden;transition:max-height .3s ease}
.task-section-body.collapsed{max-height:0!important}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.footer{text-align:center;color:#999;font-size:11px;padding:20px}

/* Info banner */
.info-banner{background:#eee8f7;border:1px solid #d1c4e9;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:12px;color:#7c6bbd;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.info-banner .info-icon{font-size:16px;flex-shrink:0}
.info-banner .info-text{flex:1}
.btn-refresh{padding:6px 14px;border:1px solid #b0b7e8;background:#fff;color:#6a72b0;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-refresh:hover{background:#8b93d1;color:#fff}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}

/* Loading overlay */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.loading-spinner{width:48px;height:48px;border:4px solid #e0e0e0;border-top-color:#8b93d1;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:14px;font-size:14px;font-weight:600;color:#6a72b0}

/* Error banner */
.error-banner{background:#fce0e0;border:1px solid #f0b0b0;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:#c06060;display:none}

/* Collapsible report section */
.report-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.report-toggle .toggle-arrow{font-size:14px;color:#aaa;transition:transform .2s;margin-left:8px}
.report-toggle.collapsed .toggle-arrow{transform:rotate(-90deg)}
.report-body{transition:max-height .3s ease;overflow:hidden}
.report-body.collapsed{max-height:0!important;padding:0}
.month-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:#ede7f6;color:#7c6bbd;margin-right:6px}

/* Workload detail cards */
.workload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:14px}
.workload-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid #b0b7e8}
.workload-card h4{font-size:14px;color:#6a72b0;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.workload-stat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.workload-stat-item{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600}
.wl-total{background:#f0edf5;color:#6a72b0}
.wl-active{background:#ddeaf7;color:#5a8fbe}
.wl-late{background:#fce0e0;color:#c06060}
.wl-gauge{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-bottom:6px}
.wl-gauge-fill{height:100%;border-radius:4px;transition:width .4s}
.wl-level-low{background:#8fd4a4}
.wl-level-mid{background:#f5d89a}
.wl-level-high{background:#f5c89a}
.wl-level-over{background:#f0a0a0}
.wl-tasks{font-size:11px;color:#888;line-height:1.8}
.wl-task-item{padding:2px 0;border-bottom:1px solid #f8f6fc}
.wl-task-item:last-child{border-bottom:none}

/* Today notification toast */
.notif-toast{position:fixed;top:20px;right:20px;width:380px;max-height:80vh;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:10000;overflow:hidden;animation:slideIn .4s ease;border:1px solid #e8e4f0}
@keyframes slideIn{from{transform:translateX(420px);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-header{background:linear-gradient(135deg,#7c83c9,#a0b4f0);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.notif-header h3{font-size:14px;margin:0}
.notif-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;opacity:.8}
.notif-close:hover{opacity:1}
.notif-body{max-height:60vh;overflow-y:auto;padding:14px 18px}
.notif-item{padding:10px 0;border-bottom:1px solid #f0edf5;font-size:12px;display:flex;gap:10px;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.notif-dot.urgent{background:#f0a0a0}
.notif-dot.warn{background:#f5c89a}
.notif-dot.normal{background:#8ec5f0}
.notif-info{flex:1}
.notif-task-name{font-weight:600;color:#3a3a4a;margin-bottom:2px}
.notif-task-meta{color:#999;font-size:11px}
.notif-empty{padding:20px;text-align:center;color:#aaa;font-size:13px}
.notif-footer{padding:10px 18px;background:#f9f7fc;border-top:1px solid #f0edf5;font-size:11px;color:#999;text-align:center}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#f0a0a0;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.notif-bell{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#8b93d1,#a0b4f0);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(139,147,209,.4);z-index:9999;display:flex;align-items:center;justify-content:center;transition:.2s}
.notif-bell:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(139,147,209,.5)}

/* Print styles */
@media print{
  body{background:#fff;font-size:11px}
  .header,.tabs,.ctrl,.footer,.info-banner,.error-banner{display:none!important}
  .container{max-width:100%;padding:10px;margin:0}
  .panel{display:none!important}
  .panel.print-target{display:block!important}
  .report-section{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  .btn{display:none!important}
  @page{size:A4;margin:15mm}
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Google Sheets에서 데이터를 불러오는 중...</div>
</div>

<div class="header">
<h1>업무관리 대시보드</h1>
<p>경영관리팀 업무 현황 및 추적 | (주)타이로스코프</p>
</div>
<div class="container">

<!-- Info Banner -->
<div class="info-banner" id="infoBanner">
  <span class="info-icon">&#9432;</span>
  <span class="info-text">Google Sheets에서 실시간 데이터를 불러옵니다. 시트에서 수정하면 새로고침 시 반영됩니다.</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">새로고침</button>
</div>

<!-- Error Banner -->
<div class="error-banner" id="errorBanner"></div>

<div class="tabs">
<button class="tab active" onclick="showTab(0)">대시보드</button>
<button class="tab" onclick="showTab(1)">월별 업무 목록</button>
<button class="tab" onclick="showTab(2)">KPI</button>
<button class="tab" onclick="showTab(3)">주간 보고</button>
</div>

<!-- TAB 0: Dashboard -->
<div class="panel active" id="panel0">
<div class="ctrl">
<label>월 선택:</label>
<select id="dashMonth" onchange="renderDashboard()">
</select>
</div>
<div class="cards" id="summaryCards"></div>
<div class="chart-section">
<h3>개인별 업무 부하량</h3>
<div id="workloadDetail" class="workload-grid"></div>
</div>
</div>

<!-- TAB 1: Monthly Task List -->
<div class="panel" id="panel1">
<div class="ctrl">
<label>월:</label>
<select id="listMonth" onchange="renderTaskList()">
</select>
<label>담당자:</label>
<select id="filterPerson" onchange="renderTaskList()">
<option value="all">전체</option>
</select>
<label>구분:</label>
<select id="filterDept" onchange="renderTaskList()"></select>
<label>우선순위:</label>
<select id="filterPriority" onchange="renderTaskList()">
<option value="all">전체</option>
<option value="1순위">1순위</option>
<option value="2순위">2순위</option>
<option value="3순위">3순위</option>
<option value="4순위">4순위</option>
</select>
</div>

<!-- In-progress tasks -->
<div class="task-section-header" onclick="toggleTaskSection('activeSection', this)">
  <span class="tsh-arrow">▼</span> 진행 업무 <span class="tsh-count" id="activeCount"></span>
</div>
<div class="task-section-body" id="activeSection">
<div class="tbl-wrap">
<table>
<thead>
<tr>
<th style="width:30px">No</th>
<th>구분</th>
<th style="min-width:250px;text-align:left">내용</th>
<th>담당자</th>
<th>우선순위</th>
<th>착수일</th>
<th>마감일</th>
<th>진척도</th>
<th>상태</th>
<th style="min-width:200px;text-align:left">상태 설명</th>
</tr>
</thead>
<tbody id="activeTaskBody"></tbody>
</table>
</div>
</div>

<!-- Completed tasks (collapsed by default) -->
<div class="task-section-header collapsed" onclick="toggleTaskSection('doneSection', this)" id="doneSectionHeader">
  <span class="tsh-arrow">▼</span> 완료 업무 <span class="tsh-count" id="doneCount"></span>
</div>
<div class="task-section-body collapsed" id="doneSection" style="max-height:0">
<div class="tbl-wrap">
<table>
<thead>
<tr>
<th style="width:30px">No</th>
<th>구분</th>
<th style="min-width:250px;text-align:left">내용</th>
<th>담당자</th>
<th>우선순위</th>
<th>착수일</th>
<th>마감일</th>
<th>진척도</th>
<th>상태</th>
<th style="min-width:200px;text-align:left">상태 설명</th>
</tr>
</thead>
<tbody id="doneTaskBody"></tbody>
</table>
</div>
</div>

<script>
// ============================================================
// GOOGLE SHEETS CONFIG
// ============================================================
const SPREADSHEET_ID = '1zgnxIN0dn1i04rBu-GQwcEZFBmqSX9w-z3w2JGlRMnc';
const SHEET_NAMES = ['1월', '2월', '3월'];

function getSheetURL(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const rows = [];
  let row = []; let field = ''; let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuote = true; }
      else if (c === ',') { row.push(field.trim()); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        row.push(field.trim()); rows.push(row); row = []; field = '';
        if (c === '\r') i++;
      } else { field += c; }
    }
  }
  if (field || row.length) { row.push(field.trim()); rows.push(row); }
  return rows;
}

// ============================================================
// DATA
// ============================================================
let taskData = [];

// Local priority overrides (persisted in browser session)
const priorityOverrides = {};

function extractMonthNumber(sheetName) {
  const match = sheetName.match(/(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

function parseProgress(val) {
  if (!val) return 0;
  val = val.replace(/"/g, '').replace(/%/g, '').trim();
  if (val === '') return 0;
  const num = parseFloat(val);
  return isNaN(num) ? 0 : Math.round(num);
}

function parseDateStr(val) {
  if (!val) return '';
  val = val.replace(/"/g, '').trim();
  if (val === '') return '';
  // Handle various date formats: 2026-03-01, 2026-3-13, etc.
  const match = val.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (match) {
    const y = match[1];
    const m = match[2].padStart(2, '0');
    const d = match[3].padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  return val;
}

function parseSheetData(csvText, monthNumber) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) return [];

  // Skip header row (row 0)
  // Column mapping by position:
  // 0: 구분, 1: 계층, 2: 내용, 3: 담당자, 4: 우선순위,
  // 5: 착수일, 6: 마감일, 7: 진척도, 8: 업무완료일,
  // 9: 상태 설명, 10: 결정필요 사항, 11: 필요 자원, 12: 미팅 요청, 13: 기타/연장

  const tasks = [];
  let currentDept = '';

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 3) continue;

    const gyeChung = (row[1] || '').trim();
    const content = (row[2] || '').trim();
    const dept = (row[0] || '').trim();

    // Track the current department from 상위 rows
    if (dept) {
      currentDept = dept;
    }

    // Skip rows where 계층 is not "하위"
    if (gyeChung !== '하위') continue;

    // Skip rows where 내용 is empty
    if (!content) continue;

    const owner = (row[3] || '').trim();
    const priority = (row[4] || '').trim();
    const start = parseDateStr(row[5] || '');
    const deadline = parseDateStr(row[6] || '');
    const progress = parseProgress(row[7] || '');
    const completionDate = parseDateStr(row[8] || '');
    const statusDesc = (row[9] || '').trim();
    const decision = (row[10] || '').trim();
    const resource = (row[11] || '').trim();
    const meeting = (row[12] || '').trim();

    const taskDept = dept || currentDept;

    tasks.push({
      month: monthNumber,
      dept: taskDept,
      content: content,
      owner: owner,
      priority: priority || '4순위',
      start: start,
      deadline: deadline,
      progress: progress,
      completionDate: completionDate,
      statusDesc: statusDesc,
      decision: decision,
      resource: resource,
      meeting: meeting
    });
  }

  return tasks;
}

async function fetchSheetData(sheetName) {
  const url = getSheetURL(sheetName);
  const response = await fetch(url);
  if (!response.ok) {
    throw new Error(`시트 "${sheetName}" 로드 실패: HTTP ${response.status}`);
  }
  const text = await response.text();
  const monthNumber = extractMonthNumber(sheetName);
  return parseSheetData(text, monthNumber);
}

async function loadAllData() {
  const loadingEl = document.getElementById('loadingOverlay');
  const errorEl = document.getElementById('errorBanner');
  const refreshBtn = document.getElementById('btnRefresh');

  loadingEl.style.display = 'flex';
  errorEl.style.display = 'none';
  refreshBtn.disabled = true;
  refreshBtn.textContent = '불러오는 중...';

  try {
    const [taskResults] = await Promise.all([
      Promise.all(SHEET_NAMES.map(name => fetchSheetData(name))),
      fetchKPIData().catch(err => console.warn('KPI 로드 실패:', err))
    ]);

    taskData = [];
    taskResults.forEach(tasks => {
      taskData.push(...tasks);
    });

    // Re-apply local priority overrides
    Object.keys(priorityOverrides).forEach(key => {
      const idx = parseInt(key);
      if (idx >= 0 && idx < taskData.length) {
        // Match by content to be safe
        const override = priorityOverrides[key];
        const matchIdx = taskData.findIndex(t =>
          t.month === override.month && t.content === override.content
        );
        if (matchIdx >= 0) {
          taskData[matchIdx].priority = override.priority;
        }
      }
    });

    populateFilters();
    renderCurrentTab();
    if (typeof updateBellBadge === 'function') updateBellBadge();
    if (typeof checkAutoNotification === 'function') checkAutoNotification();

    errorEl.style.display = 'none';
  } catch (err) {
    console.error('데이터 로드 오류:', err);
    errorEl.textContent = '데이터 로드 실패: ' + err.message + ' (페이지를 새로고침하거나 잠시 후 다시 시도해주세요)';
    errorEl.style.display = 'block';

    // If we have no data at all, show empty state
    if (taskData.length === 0) {
      populateFilters();
      renderCurrentTab();
    }
  } finally {
    loadingEl.style.display = 'none';
    refreshBtn.disabled = false;
    refreshBtn.textContent = '새로고침';
  }
}

function refreshData() {
  loadAllData();
}

// ============================================================
// KPI Data (hardcoded - complex structure, rarely changes)
// ============================================================
// KPI data - loaded dynamically from spreadsheet
let kpiData = [];
const KPI_SHEET_NAME = 'KPI';

async function fetchKPIData() {
  const url = getSheetURL(KPI_SHEET_NAME);
  const response = await fetch(url);
  if (!response.ok) throw new Error(`KPI 시트 로드 실패: HTTP ${response.status}`);
  const text = await response.text();
  const rows = parseCSV(text);
  if (rows.length < 3) return;

  const newKpiData = [];
  let currentKpi = null;

  for (let i = 2; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;

    const name = (row[0] || '').trim();
    const desc = (row[1] || '').trim();
    const startDate = parseDateStr(row[2] || '');
    const endDate = parseDateStr(row[3] || '');
    const progress = parseProgress(row[4] || '');
    const deliverable = (row[5] || '').trim();
    const weight = parseInt((row[6] || '0').replace(/[^0-9]/g, '')) || 0;

    if (name === '합계' || !desc) continue;

    if (name) {
      // Main KPI row
      currentKpi = {
        name: name,
        weight: weight,
        plan: desc,
        measure: deliverable,
        grades: {
          S: (row[7] || '').trim(),
          A: (row[8] || '').trim(),
          B: (row[9] || '').trim(),
          C: (row[10] || '').trim(),
          D: (row[11] || '').trim()
        },
        note: (row[12] || '').trim(),
        currentProgress: 0,
        steps: [],
        subSteps: []
      };
      // If main row itself has progress data
      if (startDate || progress) {
        currentKpi.subSteps.push({ desc: desc, start: startDate, end: endDate, progress: progress });
      }
      newKpiData.push(currentKpi);
    } else if (currentKpi && desc) {
      // Sub-step row
      currentKpi.steps.push(desc);
      currentKpi.subSteps.push({ desc: desc, start: startDate, end: endDate, progress: progress });
    }
  }

  // Calculate overall progress per KPI (average of sub-steps)
  newKpiData.forEach(kpi => {
    if (kpi.subSteps.length > 0) {
      const total = kpi.subSteps.reduce((sum, s) => sum + s.progress, 0);
      kpi.currentProgress = Math.round(total / kpi.subSteps.length);
    }
  });

  kpiData = newKpiData;
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
const TODAY = new Date();

function parseDate(str) {
  if (!str) return null;
  return new Date(str);
}

function formatDate(str) {
  if (!str) return '-';
  const d = new Date(str);
  if (isNaN(d.getTime())) return '-';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function getTaskStatus(task) {
  if (task.progress === 100 || task.completionDate) return '완료';
  const dl = parseDate(task.deadline);
  if (dl) {
    const diffDays = (dl - TODAY) / (1000*60*60*24);
    if (diffDays < 0 && task.progress < 100 && !task.completionDate) return '지연';
    if (diffDays >= 0 && diffDays <= 3 && task.progress < 100) return '주의';
  }
  if (task.progress > 0) return '진행중';
  return '미착수';
}

function statusBadgeClass(status) {
  switch(status) {
    case '완료': return 'badge-done';
    case '진행중': return 'badge-prog';
    case '지연': return 'badge-late';
    case '주의': return 'badge-warn';
    default: return 'badge-todo';
  }
}

function priBadgeClass(pri) {
  switch(pri) {
    case '1순위': return 'badge-p1';
    case '2순위': return 'badge-p2';
    case '3순위': return 'badge-p3';
    default: return 'badge-p4';
  }
}

function progFillClass(p) {
  if (p >= 100) return 'pf-done';
  if (p >= 50) return 'pf-mid';
  if (p > 0) return 'pf-low';
  return 'pf-zero';
}

function getOwners(ownerStr) {
  return ownerStr.split(',').map(s => s.trim());
}

function filterTasks(month) {
  if (month === 'all') return taskData;
  return taskData.filter(t => t.month === parseInt(month));
}

// ============================================================
// POPULATE FILTERS (dynamic based on loaded data)
// ============================================================
function populateFilters() {
  // Get available months
  const months = [...new Set(taskData.map(t => t.month))].sort((a, b) => a - b);

  // Populate month selectors
  const dashMonthSel = document.getElementById('dashMonth');
  const listMonthSel = document.getElementById('listMonth');

  const dashVal = dashMonthSel.value;
  const listVal = listMonthSel.value;

  let monthOptions = '<option value="all">전체</option>';
  months.forEach(m => {
    monthOptions += `<option value="${m}">${m}월</option>`;
  });

  dashMonthSel.innerHTML = monthOptions;
  listMonthSel.innerHTML = monthOptions;

  // Restore previous selection if still valid
  if (dashVal) dashMonthSel.value = dashVal;
  if (listVal) listMonthSel.value = listVal;

  // Populate person filter
  const allOwners = new Set();
  taskData.forEach(t => {
    getOwners(t.owner).forEach(o => { if (o) allOwners.add(o); });
  });
  const personSel = document.getElementById('filterPerson');
  const personVal = personSel.value;
  personSel.innerHTML = '<option value="all">전체</option>' +
    [...allOwners].sort().map(p => `<option value="${p}">${p}</option>`).join('');
  if (personVal) personSel.value = personVal;

  // Populate dept filter
  const depts = [...new Set(taskData.map(t => t.dept))];
  const deptSel = document.getElementById('filterDept');
  const deptVal = deptSel.value;
  deptSel.innerHTML = '<option value="all">전체</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');
  if (deptVal) deptSel.value = deptVal;
}

// ============================================================
// TAB SWITCHING
// ============================================================
let currentTab = 0;

function showTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => {
    p.classList.toggle('active', i===idx);
    p.classList.remove('print-target');
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 0) renderDashboard();
  if (currentTab === 1) renderTaskList();
  if (currentTab === 2) renderKPI();
  if (currentTab === 3) renderWeeklyReport();
}

// ============================================================
// TAB 0: DASHBOARD
// ============================================================
function renderDashboard() {
  const month = document.getElementById('dashMonth').value;
  const tasks = filterTasks(month);
  const statuses = tasks.map(t => getTaskStatus(t));

  const total = tasks.length;
  const done = statuses.filter(s => s==='완료').length;
  const prog = statuses.filter(s => s==='진행중').length;
  const late = statuses.filter(s => s==='지연').length;
  const warn = statuses.filter(s => s==='주의').length;
  const todo = statuses.filter(s => s==='미착수').length;

  // Build tooltip content for each status
  function buildTooltip(taskList, label) {
    if (taskList.length === 0) return `<div class="card-tooltip"><div class="tt-empty">해당 업무 없음</div></div>`;
    let html = `<div class="card-tooltip"><div class="tt-title">${label} (${taskList.length}건)</div>`;
    taskList.slice(0, 10).forEach(t => {
      html += `<div class="tt-item">${t.content} <span style="color:#999">(${t.owner}, ${formatDate(t.deadline)})</span></div>`;
    });
    if (taskList.length > 10) html += `<div class="tt-item" style="color:#aaa">외 ${taskList.length - 10}건...</div>`;
    html += '</div>';
    return html;
  }

  const doneTasks = tasks.filter((t,i) => statuses[i]==='완료');
  const progTasks = tasks.filter((t,i) => statuses[i]==='진행중');
  const lateTasks = tasks.filter((t,i) => statuses[i]==='지연');
  const warnTasks = tasks.filter((t,i) => statuses[i]==='주의');

  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="lb">총 업무</div><div class="vl">${total}</div>${buildTooltip(tasks, '전체 업무')}</div>
    <div class="card green"><div class="lb">완료</div><div class="vl">${done}</div>${buildTooltip(doneTasks, '완료 업무')}</div>
    <div class="card blue"><div class="lb">진행 중</div><div class="vl">${prog}</div>${buildTooltip(progTasks, '진행중 업무')}</div>
    <div class="card red"><div class="lb">지연</div><div class="vl">${late}</div>${buildTooltip(lateTasks, '지연 업무')}</div>
    <div class="card orange"><div class="lb">주의</div><div class="vl">${warn}</div>${buildTooltip(warnTasks, '주의 업무')}</div>
  `;

  // Personal workload detail (fixed order: 송은정, 이웅해, 최선아, then others)
  const allOwners = new Set();
  tasks.forEach(t => { getOwners(t.owner).forEach(o => { if (o) allOwners.add(o); }); });
  const preferredOrder = ['송은정', '이웅해', '최선아'];
  const otherPersons = [...allOwners].filter(p => !preferredOrder.includes(p)).sort();
  const persons = [...preferredOrder.filter(p => allOwners.has(p)), ...otherPersons];

  // Personal workload detail
  let wlHtml = '';
  persons.forEach(person => {
    const pTasks = tasks.filter(t => getOwners(t.owner).includes(person));
    const pTotal = pTasks.length;
    if (pTotal === 0) return;
    const pStatuses = pTasks.map(t => getTaskStatus(t));
    const pDone = pStatuses.filter(s => s==='완료').length;
    const pActive = pStatuses.filter(s => s==='진행중').length;
    const pLate = pStatuses.filter(s => s==='지연').length;
    const pWarn = pStatuses.filter(s => s==='주의').length;
    const pTodo = pStatuses.filter(s => s==='미착수').length;
    const pNotDone = pTotal - pDone;

    // Workload level: based on active (not done) tasks
    let level, levelText, levelClass;
    if (pNotDone <= 3) { level = 'low'; levelText = '여유'; levelClass = 'wl-level-low'; }
    else if (pNotDone <= 6) { level = 'mid'; levelText = '보통'; levelClass = 'wl-level-mid'; }
    else if (pNotDone <= 9) { level = 'high'; levelText = '바쁨'; levelClass = 'wl-level-high'; }
    else { level = 'over'; levelText = '과부하'; levelClass = 'wl-level-over'; }

    const gaugeWidth = Math.min((pNotDone / 12) * 100, 100);
    const completionRate = pTotal > 0 ? Math.round((pDone / pTotal) * 100) : 0;

    // Top urgent tasks (non-complete, sorted by deadline)
    const urgentTasks = pTasks
      .filter(t => getTaskStatus(t) !== '완료')
      .sort((a,b) => {
        const da = parseDate(a.deadline);
        const db = parseDate(b.deadline);
        return (da||Infinity) - (db||Infinity);
      })
      .slice(0, 5);

    let taskListHtml = '';
    urgentTasks.forEach(t => {
      const st = getTaskStatus(t);
      taskListHtml += `<div class="wl-task-item"><span class="badge-status ${statusBadgeClass(st)}" style="font-size:10px;padding:1px 5px">${st}</span> ${t.content} <span style="color:#bbb">(${formatDate(t.deadline)})</span></div>`;
    });

    wlHtml += `<div class="workload-card">
      <h4>${person} <span style="font-size:11px;color:#aaa;font-weight:400">완료율 ${completionRate}%</span></h4>
      <div class="workload-stat">
        <span class="workload-stat-item wl-total">전체 ${pTotal}건</span>
        <span class="workload-stat-item wl-active">진행 ${pActive}건</span>
        ${pLate > 0 ? `<span class="workload-stat-item wl-late">지연 ${pLate}건</span>` : ''}
        ${pWarn > 0 ? `<span class="workload-stat-item" style="background:#fdecd5;color:#c08050">주의 ${pWarn}건</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div class="wl-gauge" style="flex:1"><div class="wl-gauge-fill ${levelClass}" style="width:${gaugeWidth}%"></div></div>
        <span style="font-size:11px;font-weight:700;color:${level==='over'?'#c06060':level==='high'?'#c08050':'#6a72b0'}">${levelText}</span>
      </div>
      <div class="wl-tasks">${taskListHtml || '<span style="color:#ccc">진행 업무 없음</span>'}</div>
    </div>`;
  });

  // "전원" (team total) summary card
  {
    const allStatuses = tasks.map(t => getTaskStatus(t));
    const tTotal = tasks.length;
    const tDone = allStatuses.filter(s => s==='완료').length;
    const tActive = allStatuses.filter(s => s==='진행중').length;
    const tLate = allStatuses.filter(s => s==='지연').length;
    const tWarn = allStatuses.filter(s => s==='주의').length;
    const tTodo = allStatuses.filter(s => s==='미착수').length;
    const tNotDone = tTotal - tDone;
    const tCompletionRate = tTotal > 0 ? Math.round((tDone / tTotal) * 100) : 0;

    let tLevel, tLevelText, tLevelClass;
    if (tNotDone <= 8) { tLevel = 'low'; tLevelText = '여유'; tLevelClass = 'wl-level-low'; }
    else if (tNotDone <= 16) { tLevel = 'mid'; tLevelText = '보통'; tLevelClass = 'wl-level-mid'; }
    else if (tNotDone <= 24) { tLevel = 'high'; tLevelText = '바쁨'; tLevelClass = 'wl-level-high'; }
    else { tLevel = 'over'; tLevelText = '과부하'; tLevelClass = 'wl-level-over'; }
    const tGaugeWidth = Math.min((tNotDone / 30) * 100, 100);

    const tUrgent = tasks
      .filter(t => getTaskStatus(t) !== '완료')
      .sort((a,b) => (parseDate(a.deadline)||Infinity) - (parseDate(b.deadline)||Infinity))
      .slice(0, 5);
    let tTaskListHtml = '';
    tUrgent.forEach(t => {
      const st = getTaskStatus(t);
      tTaskListHtml += `<div class="wl-task-item"><span class="badge-status ${statusBadgeClass(st)}" style="font-size:10px;padding:1px 5px">${st}</span> ${t.content} <span style="color:#bbb">(${formatDate(t.deadline)})</span></div>`;
    });

    wlHtml += `<div class="workload-card" style="border-top-color:#8b93d1">
      <h4>전원 (팀 전체) <span style="font-size:11px;color:#aaa;font-weight:400">완료율 ${tCompletionRate}%</span></h4>
      <div class="workload-stat">
        <span class="workload-stat-item wl-total">전체 ${tTotal}건</span>
        <span class="workload-stat-item wl-active">진행 ${tActive}건</span>
        ${tLate > 0 ? `<span class="workload-stat-item wl-late">지연 ${tLate}건</span>` : ''}
        ${tWarn > 0 ? `<span class="workload-stat-item" style="background:#fdecd5;color:#c08050">주의 ${tWarn}건</span>` : ''}
        <span class="workload-stat-item" style="background:#f0f0f0;color:#888">미착수 ${tTodo}건</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div class="wl-gauge" style="flex:1"><div class="wl-gauge-fill ${tLevelClass}" style="width:${tGaugeWidth}%"></div></div>
        <span style="font-size:11px;font-weight:700;color:${tLevel==='over'?'#c06060':tLevel==='high'?'#c08050':'#6a72b0'}">${tLevelText}</span>
      </div>
      <div class="wl-tasks">${tTaskListHtml || '<span style="color:#ccc">진행 업무 없음</span>'}</div>
    </div>`;
  }

  document.getElementById('workloadDetail').innerHTML = wlHtml;
}

let activePriDropdown = null;

function renderTaskList() {
  const month = document.getElementById('listMonth').value;
  const person = document.getElementById('filterPerson').value;
  const dept = document.getElementById('filterDept').value;
  const priority = document.getElementById('filterPriority').value;

  let tasks = filterTasks(month);
  if (person !== 'all') tasks = tasks.filter(t => getOwners(t.owner).includes(person));
  if (dept !== 'all') tasks = tasks.filter(t => t.dept === dept);
  if (priority !== 'all') tasks = tasks.filter(t => t.priority === priority);

  // Split into active and completed
  const activeTasks = tasks.filter(t => getTaskStatus(t) !== '완료');
  const doneTasks = tasks.filter(t => getTaskStatus(t) === '완료');

  // Sort by priority level then deadline proximity
  const priOrder = {'1순위':1,'2순위':2,'3순위':3,'4순위':4};
  const sortFn = (a,b) => {
    const pa = priOrder[a.priority] || 9;
    const pb = priOrder[b.priority] || 9;
    if (pa !== pb) return pa - pb;
    const da = parseDate(a.deadline);
    const db = parseDate(b.deadline);
    if (da && db) return da - db;
    return 0;
  };
  activeTasks.sort(sortFn);
  doneTasks.sort(sortFn);

  function buildGroupedRows(taskList, startNum) {
    const groups = {};
    const groupOrder = [];
    taskList.forEach(t => {
      const key = t.dept || '기타';
      if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
      groups[key].push(t);
    });

    let html = '';
    let rowNum = startNum;
    groupOrder.forEach(grp => {
      html += `<tr class="group-header-row"><td colspan="10">${grp}</td></tr>`;
      groups[grp].forEach(t => {
        const st = getTaskStatus(t);
        const idx = taskData.indexOf(t);
        html += `<tr>
          <td>${rowNum++}</td>
          <td>${t.dept}</td>
          <td class="left">${t.content}</td>
          <td>${t.owner}</td>
          <td>
            <span class="badge-pri ${priBadgeClass(t.priority)}" onclick="togglePriDropdown(event, ${idx})" id="pri-${idx}">
              ${t.priority}
            </span>
          </td>
          <td>${formatDate(t.start)}</td>
          <td>${formatDate(t.deadline)}</td>
          <td>
            <div class="prog-bar"><div class="prog-fill ${progFillClass(t.progress)}" style="width:${t.progress}%"></div></div>
            ${t.progress}%
          </td>
          <td><span class="badge-status ${statusBadgeClass(st)}">${st}</span></td>
          <td class="left">${t.statusDesc || '-'}</td>
        </tr>`;
      });
    });
    return html;
  }

  document.getElementById('activeTaskBody').innerHTML = buildGroupedRows(activeTasks, 1);
  document.getElementById('doneTaskBody').innerHTML = buildGroupedRows(doneTasks, 1);
  document.getElementById('activeCount').textContent = `(${activeTasks.length}건)`;
  document.getElementById('doneCount').textContent = `(${doneTasks.length}건)`;
}

function toggleTaskSection(sectionId, headerEl) {
  const body = document.getElementById(sectionId);
  headerEl.classList.toggle('collapsed');
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
  } else {
    body.style.maxHeight = '0';
    body.classList.add('collapsed');
  }
}

function togglePriDropdown(e, idx) {
  e.stopPropagation();
  closePriDropdown();
  const span = document.getElementById('pri-' + idx);
  const rect = span.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'pri-dropdown';
  dropdown.style.position = 'fixed';
  dropdown.style.top = (rect.bottom + 2) + 'px';
  dropdown.style.left = rect.left + 'px';

  ['1순위','2순위','3순위','4순위'].forEach(pri => {
    const d = document.createElement('div');
    d.textContent = pri;
    d.className = priBadgeClass(pri);
    d.onclick = function(ev) {
      ev.stopPropagation();
      taskData[idx].priority = pri;
      // Save override locally
      priorityOverrides[idx] = {
        month: taskData[idx].month,
        content: taskData[idx].content,
        priority: pri
      };
      closePriDropdown();
      renderTaskList();
    };
    dropdown.appendChild(d);
  });
  document.body.appendChild(dropdown);
  activePriDropdown = dropdown;
}

function closePriDropdown() {
  if (activePriDropdown) {
    activePriDropdown.remove();
    activePriDropdown = null;
  }
}

document.addEventListener('click', closePriDropdown);

// TAB 3: WEEKLY REPORT (CEO Briefing)
// ============================================================
function renderWeeklyReport() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1); // Monday
  const nextWeekEnd = new Date(weekStart);
  nextWeekEnd.setDate(weekStart.getDate() + 11); // Next week Friday

  function fmtD(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
  function fmtFull(d) { return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일'; }
  const dayNames = ['일','월','화','수','목','금','토'];

  // Get all tasks and determine status
  const allTasks = taskData.map(t => ({...t, status: getTaskStatus(t)}));

  // Active tasks (not completed)
  const activeTasks = allTasks.filter(t => t.status !== '완료');

  // Group active tasks by owner, sorted by priority
  const memberOrder = ['송은정', '이웅해', '최선아'];
  const priOrder = {'1순위':1,'2순위':2,'3순위':3,'4순위':4};

  function getTasksByOwner(ownerName) {
    return activeTasks
      .filter(t => getOwners(t.owner).includes(ownerName))
      .sort((a,b) => (priOrder[a.priority]||9) - (priOrder[b.priority]||9));
  }

  // Decisions needed
  const decisions = allTasks.filter(t => t.decision && t.status !== '완료');
  // Meetings
  const meetings = allTasks.filter(t => t.meeting && t.status !== '완료');

  // Build report HTML (회의록 형식)
  let html = '';

  // Header
  html += `<div class="report-section">
    <h3 style="font-size:18px;border-bottom:3px solid #8b93d1;padding-bottom:8px">경영관리팀 주간 회의 <span style="font-size:13px;font-weight:400;color:#888">(참석자: 최선아, 이웅해, 송은정)</span></h3>
    <div class="report-date" style="margin-top:8px;font-size:13px">${fmtFull(now)} / 소회의실</div>
  </div>`;

  // 안내 사항
  const warnAndLateTasks = allTasks.filter(t => t.status === '지연' || t.status === '주의');
  html += `<div class="report-section">
    <h3 style="color:#e05070">안내 사항</h3>`;
  // Auto-generate notices from task data
  const completedCount = allTasks.filter(t => t.status === '완료').length;
  const totalCount = allTasks.length;
  html += `<div class="report-item">전체 업무 ${totalCount}건 중 ${completedCount}건 완료 (완료율 ${totalCount > 0 ? Math.round(completedCount/totalCount*100) : 0}%)</div>`;
  if (warnAndLateTasks.length > 0) {
    html += `<div class="report-item" style="color:#c06060">지연/주의 업무 ${warnAndLateTasks.length}건 - 우선 확인 필요</div>`;
    warnAndLateTasks.forEach(t => {
      html += `<div class="report-item" style="padding-left:28px;color:#c08050">- ${t.content} <span style="color:#999">(${t.owner}, 마감: ${formatDate(t.deadline)})</span></div>`;
    });
  }
  html += '</div>';

  // 금주, 차주 주요 업무
  html += `<div class="report-section">
    <h3 style="color:#e05070">금주, 차주 주요 업무 (${fmtD(weekStart)} ${dayNames[weekStart.getDay()]} ~ ${fmtD(nextWeekEnd)} ${dayNames[nextWeekEnd.getDay()]}까지)</h3>`;

  memberOrder.forEach(member => {
    const tasks = getTasksByOwner(member);
    html += `<h4 style="margin-top:14px;font-size:13px;font-weight:700;color:#333;border-left:3px solid #8b93d1;padding-left:8px">[${member}]</h4>`;
    if (tasks.length === 0) {
      html += '<div class="report-item" style="color:#aaa">배정된 업무 없음</div>';
    } else {
      tasks.forEach(t => {
        const dlStr = t.deadline ? formatDate(t.deadline) : '';
        const dlDisplay = dlStr && dlStr !== '-' ? ` (${dlStr})` : '';
        const statusIcon = t.status === '지연' ? '⚠ ' : t.status === '주의' ? '⚡ ' : '';
        html += `<div class="report-item" style="display:flex;align-items:flex-start;gap:6px">
          <span style="min-width:14px">☐</span>
          <span><span class="badge-pri ${priBadgeClass(t.priority)}" style="font-size:10px;padding:1px 6px;cursor:default">${t.priority}</span> ${statusIcon}${t.content}${dlDisplay}${t.statusDesc ? ' - ' + t.statusDesc : ''}</span>
        </div>`;
      });
    }
  });
  html += '</div>';

  // 기타 논의사항
  if (meetings.length > 0) {
    html += `<div class="report-section"><h3>기타 논의사항</h3>`;
    meetings.forEach(t => {
      html += `<div class="report-item">• ${t.content}: <span style="color:#6a72b0;font-weight:600">${t.meeting}</span> <span style="color:#888;font-size:11px">(${t.owner})</span></div>`;
    });
    html += '</div>';
  }

  // 대표이사 확인 필요 사항
  if (decisions.length > 0) {
    html += `<div class="report-section"><h3>대표이사 확인 필요 사항</h3>`;
    decisions.forEach(t => {
      html += `<div class="report-item">• ${t.decision} <span style="color:#888;font-size:11px">(${t.dept} - ${t.content}, 담당: ${t.owner})</span></div>`;
    });
    html += '</div>';
  }

  document.getElementById('weeklyReport').innerHTML = html;
}

// ============================================================
// DAILY NOTIFICATION
// ============================================================
function getTodayTasks() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const soon = new Date(today);
  soon.setDate(soon.getDate() + 3); // 3일 이내 마감

  return taskData.filter(t => {
    const st = getTaskStatus(t);
    if (st === '완료') return false;
    const dl = parseDate(t.deadline);
    if (!dl) return false;
    return dl <= soon;
  }).sort((a,b) => {
    const da = parseDate(a.deadline);
    const db = parseDate(b.deadline);
    return (da||0) - (db||0);
  });
}

function getUrgencyClass(t) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = parseDate(t.deadline);
  if (!dl) return 'normal';
  if (dl < today) return 'urgent';
  const diff = (dl - today) / 86400000;
  return diff <= 1 ? 'urgent' : diff <= 3 ? 'warn' : 'normal';
}

function showNotification() {
  const existing = document.getElementById('notifToast');
  if (existing) { existing.remove(); return; }

  const tasks = getTodayTasks();
  const toast = document.createElement('div');
  toast.className = 'notif-toast';
  toast.id = 'notifToast';

  let bodyHtml = '';
  if (tasks.length === 0) {
    bodyHtml = '<div class="notif-empty">오늘 긴급한 업무가 없습니다</div>';
  } else {
    tasks.forEach(t => {
      const urg = getUrgencyClass(t);
      const dl = parseDate(t.deadline);
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = dl ? Math.round((dl - today) / 86400000) : '?';
      const diffText = diff < 0 ? `${Math.abs(diff)}일 지연` : diff === 0 ? '오늘 마감' : `${diff}일 남음`;
      bodyHtml += `<div class="notif-item">
        <div class="notif-dot ${urg}"></div>
        <div class="notif-info">
          <div class="notif-task-name">${t.content}</div>
          <div class="notif-task-meta">${t.owner} | ${formatDate(t.deadline)} (${diffText}) | ${t.progress}%</div>
        </div>
      </div>`;
    });
  }

  toast.innerHTML = `
    <div class="notif-header">
      <h3>오늘의 업무 알림 (${tasks.length}건)</h3>
      <button class="notif-close" onclick="document.getElementById('notifToast').remove()">&times;</button>
    </div>
    <div class="notif-body">${bodyHtml}</div>
    <div class="notif-footer">마감 3일 이내 / 지연 업무 표시 | 매일 오전 10시 자동 알림</div>
  `;
  document.body.appendChild(toast);
}

function updateBellBadge() {
  const tasks = getTodayTasks();
  const badge = document.getElementById('notifBadge');
  if (tasks.length > 0) {
    badge.textContent = tasks.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// Auto-notification at 10 AM
function checkAutoNotification() {
  const now = new Date();
  const todayKey = now.toISOString().slice(0,10);
  const shown = localStorage.getItem('notif_shown_' + todayKey);

  if (now.getHours() >= 10 && !shown) {
    // Request browser notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    const tasks = getTodayTasks();
    if (tasks.length > 0) {
      // Show in-app toast
      showNotification();

      // Browser push notification
      if ('Notification' in window && Notification.permission === 'granted') {
        const urgent = tasks.filter(t => getUrgencyClass(t) === 'urgent').length;
        const body = urgent > 0
          ? `긴급 ${urgent}건 포함 총 ${tasks.length}건의 업무가 있습니다.`
          : `마감 임박 ${tasks.length}건의 업무가 있습니다.`;
        new Notification('업무관리 - 오늘의 알림', {
          body: body,
          icon: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>'
        });
      }
      localStorage.setItem('notif_shown_' + todayKey, '1');
    }
  }
}

// Check every minute for 10 AM trigger
setInterval(checkAutoNotification, 60000);
