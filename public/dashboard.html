.card.danger{border-left-color:#c62828}
.card.ok{border-left-color:#2e7d32}

.card.danger .vl{color:#c62828}

.ctrl label{font-size:12px;font-weight:600;color:#555}

</div>
<div class="tbl-wrap"><table><thead id="overHead"></thead><tbody id="overBody"></tbody></table></div>

<div class="panel" id="panel1">

<div class="yr-tabs" id="yrTabs1" style="margin:0"></div>
</div>
<div id="personDetail"></div>
</div>

<div class="panel" id="panel2">
<div class="ctrl">
<div><label>과제: </label><select id="selProject"></select></div>
<div class="yr-tabs" id="yrTabs2" style="margin:0"></div>
</div>
<div id="projDetail"></div>
</div>

<div class="panel" id="panel3">

</div>
<div id="costDetail"></div>
</div>

</div>
<div id="simResult"></div>
</div>

function getMonthlyBase(name, mi, annualSalary) {
  const pd = payrollData[name];
  if (pd && pd[mi] !== undefined) return pd[mi].b;
  return annualSalary ? Math.round(annualSalary / 12) : 0;
}
function getInsBreakdown(p, mi) {
  if(!p.ins||!p.salary) return {pension:0,health:0,ltcare:0,employ:0,accident:0,total:0};
  const i=p.ins;
  // 이사(isExec): 고용·산재 미가입 / 실제 산재보험료 CSV 기준
  const accident=accidentMap[p.name]??0;
  const total=i.p+i.h+i.c+i.e+accident;
  return {pension:i.p,health:i.h,ltcare:i.c,employ:i.e,accident,total};
}
// 월 인건비 = 실제 기본급(payrollData) + 회사부담 4대보험 (1월 기준, 이후 연봉/12)
function getTotalCostPerMonth(p, mi) {
  const ms=getMonthlyBase(p.name, mi??0, p.salary);
  if(!ms) return 0;
  return ms + getInsBreakdown(p).total;
}
function getInsRate(p) {
  const ms=getMonthlyBase(p.name, 0, p.salary);
  if(!ms) return 0;
  return getInsBreakdown(p).total / ms;
}

// ═══ HELPERS ═══
let curYear = 2026;
function getProjects(yr){ return yr===2026?P2026:P2027; }
function getData(p,yr){ return yr===2026?p.y2026:p.y2027; }
function monthlyTotal(p,yr){
  const d=getData(p,yr), projs=getProjects(yr);
  return Array.from({length:12},(_,i)=> projs.reduce((s,pj)=>{const pd=d[pj];return s+(pd?pd.m[i]:0)},0));
}
function countTasks(p,yr){
  const d=getData(p,yr), projs=getProjects(yr);
  let resp=0,part=0;
  projs.forEach(pj=>{const pd=d[pj];if(!pd)return;const hasRate=pd.m.some(v=>v>0);if(!hasRate)return;if(pd.r==='책임')resp++;else part++;});
  return {resp,part,total:resp+part};
}
function isExempt3c5g(projName,yr){
  const pm=projectMaster[projName];if(!pm||!pm.periods[yr])return false;
  const end=new Date(pm.periods[yr].end);
  const start=new Date(pm.periods[yr].start);
  const diff=(end-start)/(1000*60*60*24);
  return diff<=183;
}
function countTasksFiltered(p,yr){
  const d=getData(p,yr),projs=getProjects(yr);
  let resp=0,part=0;
  projs.forEach(pj=>{const pd=d[pj];if(!pd)return;const hasRate=pd.m.some(v=>v>0);if(!hasRate)return;if(isExempt3c5g(pj,yr))return;if(pd.r==='책임')resp++;else part++;});
  return {resp,part};
}
function rateClass(v){
  if(v>100)return 'c-danger';if(v===100)return 'c-ok';if(v>=51)return 'c-mid';if(v>=1)return 'c-low';return 'c-zero';
}
function fmt(n){return n.toLocaleString('ko-KR')}

// ═══ TAB SWITCHING ═══
function showTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===idx)});
  document.querySelectorAll('.panel').forEach((p,i)=>{p.classList.toggle('active',i===idx)});
  if(idx===1)renderPerson();
  if(idx===2)renderProject();
  if(idx===3)renderCost();
}

function makeYearTabs(containerId,cb){
  const c=document.getElementById(containerId);
  c.innerHTML=[2026,2027].map(y=>`<button class="yr-tab ${y===curYear?'active':''}" onclick="switchYear(${y},'${containerId}',${cb.name})">${y}년</button>`).join('');
}
function switchYear(y,cid,cb){
  curYear=y;
  document.querySelectorAll('.yr-tab').forEach(b=>{b.classList.toggle('active',b.textContent===y+'년')});
  renderOverview();renderPerson();renderProject();renderCost();
}

// ═══ TAB 0: OVERVIEW ═══
function renderOverview(){
  const yr=curYear,projs=getProjects(yr);
  let alertCount=0,alertHtml='';
  let overCapPeople=0,taskOverPeople=0;

  people.forEach(p=>{
    const totals=monthlyTotal(p,yr);
    const overMonths=totals.map((v,i)=>v>100?MONTHS[i]:null).filter(Boolean);
    if(overMonths.length>0){overCapPeople++;alertCount++;
      alertHtml+=`<div class="alert-item over-cap"><span style="font-size:16px">&#10060;</span><span class="alert-name">${p.name}</span><span>[${p.dept}] 참여율 100% 초과: ${overMonths.join(', ')} (최대 ${Math.max(...totals)}%)</span></div>`;
    }
    const tf=countTasksFiltered(p,yr);
    if(tf.resp>MAX_RESP){taskOverPeople++;alertCount++;
      alertHtml+=`<div class="alert-item over-task"><span style="font-size:16px">&#9888;</span><span class="alert-name">${p.name}</span><span>[${p.dept}] 책임과제 ${tf.resp}개 (최대 ${MAX_RESP}개 초과)</span></div>`;
    }
    if(tf.part>MAX_PART){taskOverPeople++;alertCount++;
      alertHtml+=`<div class="alert-item over-task"><span style="font-size:16px">&#9888;</span><span class="alert-name">${p.name}</span><span>[${p.dept}] 참여과제 ${tf.part}개 (최대 ${MAX_PART}개 초과)</span></div>`;
    }
    if(p.status==='퇴사예정'){alertCount++;
      alertHtml+=`<div class="alert-item info"><span style="font-size:16px">&#128100;</span><span class="alert-name">${p.name}</span><span>[${p.dept}] 퇴사예정 - 과제 재배분 필요</span></div>`;
    }
  });

  document.getElementById('summaryCards').innerHTML=`
    <div class="card"><div class="lb">총 인원</div><div class="vl">${people.length}명</div></div>
    <div class="card"><div class="lb">활성 과제 (${yr})</div><div class="vl">${projs.length}개</div></div>
    <div class="card ${overCapPeople?'danger':'ok'}"><div class="lb">참여율 초과자</div><div class="vl">${overCapPeople}명</div></div>
    <div class="card ${taskOverPeople?'danger':'ok'}"><div class="lb">3책5공 위반</div><div class="vl">${taskOverPeople}명</div></div>
  `;
  document.getElementById('alertCnt').textContent=alertCount;
  document.getElementById('alertCnt').className=alertCount?'badge':'badge ok-badge';
  document.getElementById('alertBox').innerHTML=alertHtml||'<div style="color:#2e7d32;padding:8px">&#10004; 모든 인원이 규정 범위 내입니다.</div>';

  // Overview table
  let thead=`<tr><th rowspan="2">이름</th><th rowspan="2">소속</th><th rowspan="2">상태</th><th colspan="2" class="gh">과제 수</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th rowspan="2">평균</th></tr>`;
  thead+=`<tr><th>책임</th><th>참여</th>${MONTHS.map(()=>'<th>합계%</th>').join('')}</tr>`;
  document.getElementById('overHead').innerHTML=thead;

  let tbody='';
  people.forEach(p=>{
    const totals=monthlyTotal(p,yr);
    const avg=Math.round(totals.reduce((a,b)=>a+b,0)/12);
    const tc=countTasks(p,yr);
    const tf=countTasksFiltered(p,yr);
    const stCls=p.status==='재직'?'st-active':'st-leave';
    const respCls=tf.resp>MAX_RESP?'c-danger':'';
    const partCls=tf.part>MAX_PART?'c-danger':'';
    tbody+=`<tr><td class="name-cell">${p.name}</td><td class="name-cell">${p.dept}</td><td><span class="${stCls}">${p.status}</span></td>`;
    tbody+=`<td class="${respCls}">${tc.resp}</td><td class="${partCls}">${tc.part}</td>`;
    totals.forEach(v=>{tbody+=`<td class="${rateClass(v)}">${v}%</td>`});
    tbody+=`<td class="${rateClass(avg)}">${avg}%</td></tr>`;
  });
  document.getElementById('overBody').innerHTML=tbody;
}

  projs.forEach(pj=>{

  const avg=Math.round(totals.reduce((a,b)=>a+b,0)/12);
  html+=`<tr style="font-weight:700;background:#f5f5f5"><td>합계</td><td></td><td></td>`;
  totals.forEach(v=>{html+=`<td class="${rateClass(v)}">${v}%</td>`});
  html+=`<td class="${rateClass(avg)}">${avg}%</td></tr>`;
  html+=`</tbody></table></div>`;

  // Estimated labor cost per project (with insurance)
  if(p.salary){
    const insB=getInsBreakdown(p);

    const insRatePct=(getInsRate(p)*100).toFixed(2);

    </div>`;

      const annualCost=pd.m.reduce((s,v)=>s+monthTotal*v/100,0);

      grandTotal+=annualCost;

    html+=`</tbody></table></div>`;
  }

  document.getElementById('personDetail').innerHTML=html;
}

    html+=`<td>${isKind&&p.salary?fmt(Math.round(annualCost))+'원':'-'}</td></tr>`;
  });

  html+=`<tr style="font-weight:700;background:#f5f5f5"><td colspan="4">합계</td>`;
  monthTotals.forEach(v=>{html+=`<td>${v}%</td>`});
  html+=`<td></td><td>${fmt(Math.round(costTotal))}원</td><td>${fmt(Math.round(cashTotal))}원</td><td>${fmt(Math.round(kindTotal))}원</td></tr>`;
  html+=`</tbody></table></div>`;

  // Budget summary
  if(pm&&pm.periods[yr]){
    const gov=pm.periods[yr].gov;
    html+=`<div style="background:#e8f5e9;padding:12px 16px;border-radius:8px;margin-top:8px;font-size:12px">
      <b>정부출연금:</b> ${fmt(gov)}원 | <b>인건비 합계(보험포함):</b> ${fmt(Math.round(costTotal))}원
      | <b>현금분:</b> ${fmt(Math.round(cashTotal))}원 | <b>현물분:</b> ${fmt(Math.round(kindTotal))}원
    </div>`;
  }

  document.getElementById('projDetail').innerHTML=html;
}

// ═══ TAB 3: LABOR COST ═══
function renderCost(){
  const yr=curYear,projs=getProjects(yr);
  const view=document.getElementById('costView')?document.getElementById('costView').value:'person';
  let html='';

  if(view==='person'){
    html+=`<div class="section-title">인별 인건비 산출 (${yr}년, 4대보험 포함)</div>`;
    html+=`<div class="tbl-wrap"><table><thead><tr><th>이름</th><th>소속</th><th>연봉</th><th>보험요율</th><th>월 총비용</th>`;
    projs.forEach(pj=>{html+=`<th>${pj}<br>참여율</th><th>${pj}<br>인건비</th>`});
    html+=`<th>인건비 합계</th></tr></thead><tbody>`;
    let projTotals={};projs.forEach(pj=>projTotals[pj]=0);
    let grandTotal=0;
    people.forEach(p=>{
      if(!p.salary)return;
      const d=getData(p,yr);
      const monthCost=getTotalCostPerMonth(p);
      const insRatePct=(getInsRate(p)*100).toFixed(1);
      let rowTotal=0;
      html+=`<tr><td class="name-cell">${p.name}${p.isExec?' <span style="font-size:10px;color:#e65100">(임원)</span>':''}${p.maxRate?' <span style="font-size:10px;color:#e65100">(외부)</span>':''}</td><td>${p.dept}</td><td style="text-align:right">${fmt(p.salary)}</td><td>${insRatePct}%</td><td style="text-align:right">${fmt(Math.round(monthCost))}</td>`;
      projs.forEach(pj=>{
        const pd=d[pj];
        if(!pd||!pd.m.some(v=>v>0)){html+=`<td class="c-zero">-</td><td class="c-zero">-</td>`;return;}
        const avgRate=Math.round(pd.m.reduce((a,b)=>a+b,0)/12);
        const annualCost=pd.m.reduce((s,v)=>s+monthCost*v/100,0);
        rowTotal+=annualCost;projTotals[pj]+=annualCost;
        html+=`<td>${avgRate}%</td><td style="text-align:right">${fmt(Math.round(annualCost))}</td>`;
      });
      grandTotal+=rowTotal;
      html+=`<td style="text-align:right;font-weight:700">${fmt(Math.round(rowTotal))}</td></tr>`;
    });
    html+=`<tr style="font-weight:700;background:#f5f5f5"><td colspan="5">합계</td>`;
    projs.forEach(pj=>{html+=`<td></td><td style="text-align:right">${fmt(Math.round(projTotals[pj]))}</td>`});
    html+=`<td style="text-align:right">${fmt(Math.round(grandTotal))}</td></tr>`;
    html+=`</tbody></table></div>`;

  } else if(view==='project'){
    html+=`<div class="section-title">과제별 인건비 산출 (${yr}년, 4대보험 포함)</div>`;
    projs.forEach(pj=>{
      const pm=projectMaster[pj];
      let cashSum=0,kindSum=0,totalSum=0,pCount=0;
      let rows='';
      people.forEach(p=>{
        const d=getData(p,yr);const pd=d[pj];
        if(!pd||!pd.m.some(v=>v>0))return;
        pCount++;
        const monthCost=getTotalCostPerMonth(p);
        const annualCost=pd.m.reduce((s,v)=>s+monthCost*v/100,0);
        const avgRate=Math.round(pd.m.reduce((a,b)=>a+b,0)/12);
        const isCash=pd.t==='현금',isKind=pd.t==='현물';
        totalSum+=annualCost;
        if(isCash)cashSum+=annualCost; else if(isKind)kindSum+=annualCost;
        rows+=`<tr><td class="name-cell">${p.name}</td><td>${pd.r||'참여'}</td><td>${pd.t||'-'}</td><td>${avgRate}%</td>`;
        rows+=`<td style="text-align:right">${fmt(Math.round(annualCost))}</td>`;
        rows+=`<td style="text-align:right">${isCash?fmt(Math.round(annualCost)):'-'}</td>`;
        rows+=`<td style="text-align:right">${isKind?fmt(Math.round(annualCost)):'-'}</td></tr>`;
      });
      const gov=pm&&pm.periods[yr]?pm.periods[yr].gov:0;
      html+=`<div class="proj-card"><h3>${pj} (${pCount}명)</h3>`;
      if(gov)html+=`<div class="meta" style="margin-bottom:8px"><b>정부출연금:</b> ${fmt(gov)}원</div>`;
      html+=`<div class="tbl-wrap" style="margin:0"><table><thead><tr><th>이름</th><th>역할</th><th>유형</th><th>평균 참여율</th><th>연간 인건비</th><th>현금분</th><th>현물분</th></tr></thead><tbody>`;
      html+=rows;
      html+=`<tr style="font-weight:700;background:#f5f5f5"><td colspan="4">합계</td><td style="text-align:right">${fmt(Math.round(totalSum))}</td><td style="text-align:right">${fmt(Math.round(cashSum))}</td><td style="text-align:right">${fmt(Math.round(kindSum))}</td></tr>`;
      html+=`</tbody></table></div></div>`;
    });

  } else { // summary
    html+=`<div class="section-title">인건비 종합 요약 (${yr}년, 4대보험 포함)</div>`;
    let summaryData=[];
    projs.forEach(pj=>{
      const pm=projectMaster[pj];
      let cash=0,kind=0,total=0,cnt=0;
      people.forEach(p=>{
        const d=getData(p,yr);const pd=d[pj];
        if(!pd||!pd.m.some(v=>v>0))return;
        cnt++;
        const monthCost=getTotalCostPerMonth(p);
        const cost=pd.m.reduce((s,v)=>s+monthCost*v/100,0);
        total+=cost;
        if(pd.t==='현금')cash+=cost; else if(pd.t==='현물')kind+=cost;
      });
      summaryData.push({name:pj,gov:pm&&pm.periods[yr]?pm.periods[yr].gov:0,total,cash,kind,cnt});
    });
    html+=`<div class="tbl-wrap"><table><thead><tr><th>과제명</th><th>참여인원</th><th>정부출연금</th><th>인건비 합계</th><th>현금분</th><th>현물분</th><th>인건비/정부출연</th></tr></thead><tbody>`;
    let gGov=0,gTotal=0,gCash=0,gKind=0;
    summaryData.forEach(s=>{
      gGov+=s.gov;gTotal+=s.total;gCash+=s.cash;gKind+=s.kind;
      const ratio=s.gov?((s.total/s.gov)*100).toFixed(1)+'%':'-';
      html+=`<tr><td class="name-cell">${s.name}</td><td>${s.cnt}명</td><td style="text-align:right">${fmt(s.gov)}</td><td style="text-align:right">${fmt(Math.round(s.total))}</td><td style="text-align:right">${fmt(Math.round(s.cash))}</td><td style="text-align:right">${fmt(Math.round(s.kind))}</td><td>${ratio}</td></tr>`;
    });
    html+=`<tr style="font-weight:700;background:#f5f5f5"><td>전체 합계</td><td></td><td style="text-align:right">${fmt(gGov)}</td><td style="text-align:right">${fmt(Math.round(gTotal))}</td><td style="text-align:right">${fmt(Math.round(gCash))}</td><td style="text-align:right">${fmt(Math.round(gKind))}</td><td>${gGov?((gTotal/gGov)*100).toFixed(1)+'%':'-'}</td></tr>`;
    html+=`</tbody></table></div>`;

    // Insurance info box
    html+=`<div style="background:#fff3e0;padding:12px 16px;border-radius:8px;margin-top:14px;font-size:12px;line-height:1.8">
      <b>인건비 계산 기준:</b><br>
      - 월 급여 = 연봉(과제참여율정리-인건비) &divide; 12 <b>(휴일·연장·야간근로, 식대 등 수당 제외)</b><br>
      - 회사부담 4대보험 = 국민연금 + 건강보험 + 장기요양 + 고용보험 + 산재보험<br>
      - 국민연금·건강보험·장기요양: <b>1월 급여대장 실제 금액</b> (근로자 공제 = 회사부담 동일)<br>
      - 고용보험: <b>1월 급여대장 실제 금액</b> (회사부담분은 별도 확인 필요)<br>
      - 산재보험: <b>실제 금액 (1월 CSV 기준)</b><br>
      - 임원(대표이사/이사): 고용보험·산재보험 제외<br>
      <span style="color:#e65100">* 과제 증빙용 인건비 = 연봉/12 + 회사부담 4대보험 (소속 부서 미표기)</span>
    </div>`;
  }
  document.getElementById('costDetail').innerHTML=html;
}

// ═══ TAB 4: SIMULATOR ═══
let simAssigns=[];
function initSim(){
  const sm=document.getElementById('simStartM'),em=document.getElementById('simEndM');
  MONTHS.forEach((m,i)=>{sm.innerHTML+=`<option value="${i}">${m}</option>`;em.innerHTML+=`<option value="${i}">${m}</option>`;});
  em.value='11';
  addSimPerson();
}
function addSimPerson(){
  const id=simAssigns.length;
  simAssigns.push({personIdx:0,rate:10});
  renderSimAssigns();
}
function removeSimPerson(id){
  simAssigns.splice(id,1);
  renderSimAssigns();
}
function renderSimAssigns(){
  const div=document.getElementById('simAssignments');
  div.innerHTML=simAssigns.map((a,i)=>`<div class="sim-row" style="background:#f8f9ff;padding:8px;border-radius:6px">
    <label>인력 ${i+1}:</label>
    <select onchange="simAssigns[${i}].personIdx=+this.value">${people.map((p,j)=>`<option value="${j}" ${j===a.personIdx?'selected':''}>${p.name} (${p.dept})</option>`).join('')}</select>
    <label style="min-width:auto">참여율:</label>
    <input type="number" value="${a.rate}" min="1" max="100" onchange="simAssigns[${i}].rate=+this.value">%
    <label style="min-width:auto">역할:</label>
    <select onchange="simAssigns[${i}].role=this.value"><option value="">참여</option><option value="책임">책임</option></select>
    <button class="btn btn-danger" style="padding:4px 10px;font-size:11px" onclick="removeSimPerson(${i})">삭제</button>
  </div>`).join('');
}
function runSim(){
  const yr=+document.getElementById('simYear').value;
  const startM=+document.getElementById('simStartM').value;
  const endM=+document.getElementById('simEndM').value;
  const projName=document.getElementById('simName').value||'신규과제';

  let html=`<div class="section-title">시뮬레이션 결과: ${projName} (${yr}년 ${MONTHS[startM]}~${MONTHS[endM]})</div>`;
  let hasIssue=false;

  html+=`<div class="tbl-wrap"><table><thead><tr><th>이름</th><th>소속</th><th>역할</th><th>신규 참여율</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>판정</th><th>월 추가 인건비<br>(보험포함)</th></tr></thead><tbody>`;

  simAssigns.forEach(a=>{
    const p=people[a.personIdx];
    const curTotals=monthlyTotal(p,yr);
    const rate=a.rate||0;
    const monthCost=getTotalCostPerMonth(p);
    const addedCost=Math.round(monthCost*rate/100);
    let rowIssue=false;
    let maxRateIssue=p.maxRate&&rate>p.maxRate;

    html+=`<tr><td class="name-cell">${p.name}${p.maxRate?' <span style="font-size:10px;color:#e65100">(max${p.maxRate}%)</span>':''}</td><td>${p.dept}</td><td>${a.role||'참여'}</td><td>${rate}%${maxRateIssue?' <span style="color:#c62828">!</span>':''}</td>`;
    MONTHS.forEach((_,i)=>{
      const inRange=i>=startM&&i<=endM;
      const newTotal=curTotals[i]+(inRange?rate:0);
      const cls=!inRange?'c-zero':newTotal>100?'c-danger':rateClass(newTotal);
      if(inRange&&newTotal>100){rowIssue=true;hasIssue=true;}
      html+=`<td class="${cls}">${inRange?newTotal+'%':'-'}</td>`;
    });
    if(maxRateIssue){rowIssue=true;hasIssue=true;}
    html+=`<td style="font-weight:700;color:${rowIssue?'#c62828':'#2e7d32'}">${maxRateIssue?'상한초과!':rowIssue?'초과!':'OK'}</td>`;
    html+=`<td>${p.salary?fmt(addedCost)+'원':'-'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // 3책5공 check
  html+=`<div class="section-title">3책5공 영향 분석</div><div class="tbl-wrap"><table><thead><tr><th>이름</th><th>현재 책임</th><th>현재 참여</th><th>추가 후 책임</th><th>추가 후 참여</th><th>판정</th></tr></thead><tbody>`;
  simAssigns.forEach(a=>{
    const p=people[a.personIdx];
    const tf=countTasksFiltered(p,yr);
    const newResp=tf.resp+(a.role==='책임'?1:0);
    const newPart=tf.part+(a.role==='책임'?0:1);
    const over=newResp>MAX_RESP||newPart>MAX_PART;
    if(over)hasIssue=true;
    html+=`<tr><td class="name-cell">${p.name}</td><td>${tf.resp}</td><td>${tf.part}</td>
    <td class="${newResp>MAX_RESP?'c-danger':''}">${newResp} / ${MAX_RESP}</td>
    <td class="${newPart>MAX_PART?'c-danger':''}">${newPart} / ${MAX_PART}</td>
    <td style="font-weight:700;color:${over?'#c62828':'#2e7d32'}">${over?'위반!':'OK'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // Summary
  const totalAddedCost=simAssigns.reduce((s,a)=>{
    const p=people[a.personIdx];
    const months=endM-startM+1;
    return s+(getTotalCostPerMonth(p)*a.rate/100*months);
  },0);
  const totalSalaryOnly=simAssigns.reduce((s,a)=>{
    const p=people[a.personIdx];
    const months=endM-startM+1;
    return s+(p.salary/12*a.rate/100*months);
  },0);
  html+=`<div class="cards"><div class="card ${hasIssue?'danger':'ok'}"><div class="lb">종합 판정</div><div class="vl" style="font-size:18px">${hasIssue?'문제 발견':'배치 가능'}</div></div>
  <div class="card"><div class="lb">추가 인건비 (급여만)</div><div class="vl" style="font-size:16px">${fmt(Math.round(totalSalaryOnly))}원</div></div>
  <div class="card"><div class="lb">추가 인건비 (보험포함)</div><div class="vl" style="font-size:16px">${fmt(Math.round(totalAddedCost))}원</div></div></div>`;

  // Recommendation for available people
  html+=`<div class="section-title">여유 인력 추천 (평균 잔여 용량 기준)</div><div class="tbl-wrap"><table><thead><tr><th>이름</th><th>소속</th><th>평균 잔여 용량</th><th>최소 잔여 월</th></tr></thead><tbody>`;
  const avail=people.map(p=>{
    const totals=monthlyTotal(p,yr);
    const relevantMonths=totals.slice(startM,endM+1);
    const minRemain=Math.min(...relevantMonths.map(v=>100-v));
    const avgRemain=Math.round(relevantMonths.reduce((a,b)=>a+(100-b),0)/relevantMonths.length);
    return {p,minRemain,avgRemain};
  }).filter(x=>x.minRemain>0&&x.p.status==='재직').sort((a,b)=>b.avgRemain-a.avgRemain).slice(0,10);

  avail.forEach(({p,minRemain,avgRemain})=>{
    html+=`<tr><td class="name-cell">${p.name}</td><td>${p.dept}</td><td>${avgRemain}%</td><td>${minRemain}%</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  document.getElementById('simResult').innerHTML=html;
}

// ═══ INIT ═══
function init(){
  // Person selector
  const selP=document.getElementById('selPerson');
  people.forEach((p,i)=>{selP.innerHTML+=`<option value="${i}">${p.name} (${p.dept})</option>`});
  selP.addEventListener('change',renderPerson);

  // Project selector
  const selPj=document.getElementById('selProject');
  const allProjs=[...new Set([...P2026,...P2027])];
  allProjs.forEach(pj=>{selPj.innerHTML+=`<option value="${pj}">${pj}</option>`});
  selPj.addEventListener('change',renderProject);

  makeYearTabs('yrTabs0',renderOverview);
  makeYearTabs('yrTabs1',renderPerson);
  makeYearTabs('yrTabs2',renderProject);
  makeYearTabs('yrTabs3',renderCost);

  initSim();
  renderOverview();
}
init();
</script>
