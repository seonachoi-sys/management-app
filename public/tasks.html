<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무관리 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#333;font-size:13px}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:20px 28px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px}
.header p{font-size:12px;opacity:.8;margin-top:3px}
.container{max-width:1500px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;background:#fff;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;border-bottom:3px solid transparent;transition:.2s}
.tab.active{background:#1a237e;color:#fff;border-bottom-color:#ff6f00}
.tab:hover:not(.active){background:#e8eaf6}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #1a237e}
.card.green{border-left-color:#2e7d32}
.card.blue{border-left-color:#1565c0}
.card.red{border-left-color:#c62828}
.card.orange{border-left-color:#e65100}
.card .lb{font-size:12px;color:#666;margin-bottom:4px}
.card .vl{font-size:28px;font-weight:700}
.card.green .vl{color:#2e7d32}
.card.blue .vl{color:#1565c0}
.card.red .vl{color:#c62828}
.card.orange .vl{color:#e65100}

/* Section */
.section-title{font-size:15px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.chart-section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px}
.chart-section h3{font-size:14px;font-weight:700;margin-bottom:14px;color:#333}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{min-width:70px;font-size:12px;font-weight:600;text-align:right}
.bar-track{flex:1;height:24px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:width .5s;min-width:0}
.bar-seg.s-done{background:#4caf50}
.bar-seg.s-prog{background:#42a5f5}
.bar-seg.s-late{background:#ef5350}
.bar-seg.s-warn{background:#ff9800}
.bar-seg.s-todo{background:#bdbdbd}
.bar-value{min-width:40px;font-size:12px;font-weight:600;text-align:left}

/* Pie chart via CSS conic-gradient */
.pie-container{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center}
.pie{width:180px;height:180px;border-radius:50%;position:relative}
.pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#333}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.pie-legend-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* Controls */
.ctrl{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ctrl label{font-size:12px;font-weight:600;color:#555}
.ctrl select{padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:12px;font-family:inherit}

/* Table */
.tbl-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
thead th{background:#f5f5f5;padding:8px 6px;text-align:center;font-weight:600;color:#444;border-bottom:2px solid #ddd;position:sticky;top:0;z-index:2}
tbody td{padding:6px 8px;text-align:center;border-bottom:1px solid #eee}
tbody tr:hover{background:#f8f9ff}
td.left{text-align:left}

/* Status badges */
.badge-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-done{background:#e8f5e9;color:#2e7d32}
.badge-prog{background:#e3f2fd;color:#1565c0}
.badge-late{background:#ffebee;color:#c62828}
.badge-warn{background:#fff3e0;color:#e65100}
.badge-todo{background:#f5f5f5;color:#999}

/* Priority badges */
.badge-pri{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;position:relative}
.badge-p1{background:#ffebee;color:#c62828}
.badge-p2{background:#fff3e0;color:#e65100}
.badge-p3{background:#e3f2fd;color:#1565c0}
.badge-p4{background:#f5f5f5;color:#666}

/* Priority dropdown */
.pri-dropdown{position:absolute;top:100%;left:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100;min-width:80px;overflow:hidden}
.pri-dropdown div{padding:6px 12px;font-size:11px;cursor:pointer;font-weight:600}
.pri-dropdown div:hover{background:#e8eaf6}

/* Progress bar */
.prog-bar{width:80px;height:8px;background:#eee;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-fill.pf-done{background:#4caf50}
.prog-fill.pf-mid{background:#42a5f5}
.prog-fill.pf-low{background:#ff9800}
.prog-fill.pf-zero{background:#eee}

/* KPI */
.kpi-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px;border-left:4px solid #1a237e}
.kpi-card h3{font-size:15px;margin-bottom:4px;color:#1a237e}
.kpi-card .kpi-weight{font-size:12px;color:#666;margin-bottom:12px}
.kpi-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;font-size:12px}
.kpi-meta dt{font-weight:700;color:#555}
.kpi-meta dd{color:#333;margin-bottom:6px}
.kpi-steps{margin-bottom:14px}
.kpi-steps h4{font-size:12px;font-weight:700;margin-bottom:6px;color:#555}
.kpi-steps li{font-size:12px;margin-bottom:3px;padding-left:4px;list-style:none}
.kpi-steps li:before{content:'';display:inline-block;width:6px;height:6px;background:#1a237e;border-radius:50%;margin-right:6px;vertical-align:middle}
.grade-table{width:100%;border-collapse:collapse;font-size:11px}
.grade-table th,.grade-table td{border:1px solid #ddd;padding:6px 8px;text-align:center}
.grade-table th{background:#f5f5f5;font-weight:700}
.grade-table td:first-child{font-weight:700;width:40px}
.grade-s{background:#e8f5e9;color:#2e7d32}
.grade-a{background:#e3f2fd;color:#1565c0}
.grade-b{background:#fff8e1;color:#f57f17}
.grade-c{background:#fff3e0;color:#e65100}
.grade-d{background:#ffebee;color:#c62828}
.grade-scale{display:flex;gap:0;margin-bottom:18px;border-radius:8px;overflow:hidden}
.grade-scale div{flex:1;text-align:center;padding:8px 4px;font-weight:700;font-size:13px;color:#fff}

/* Weekly report */
.report-section{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px}
.report-section h3{font-size:15px;font-weight:700;color:#1a237e;margin-bottom:4px;border-bottom:2px solid #1a237e;padding-bottom:6px}
.report-section h4{font-size:13px;font-weight:700;color:#333;margin:12px 0 6px;padding-left:4px;border-left:3px solid #1a237e}
.report-item{font-size:12px;padding:4px 0 4px 16px;line-height:1.6;border-bottom:1px solid #f5f5f5}
.report-item:last-child{border-bottom:none}
.report-highlight{background:#fff3e0;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:12px;border-left:3px solid #e65100}
.report-date{font-size:12px;color:#666;margin-bottom:12px}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:.2s}
.btn-primary{background:#1a237e;color:#fff}.btn-primary:hover{background:#283593}
.btn-print{background:#e65100;color:#fff;margin-left:10px}.btn-print:hover{background:#bf360c}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.footer{text-align:center;color:#999;font-size:11px;padding:20px}

/* Print styles */
@media print{
  body{background:#fff;font-size:11px}
  .header,.tabs,.ctrl,.footer{display:none!important}
  .container{max-width:100%;padding:10px;margin:0}
  .panel{display:none!important}
  .panel.print-target{display:block!important}
  .report-section{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  .btn{display:none!important}
  @page{size:A4;margin:15mm}
}
</style>
</head>

<div class="panel" id="panel1">

<option value="all">전체</option>
<option value="1">1월</option>
<option value="3">3월</option>
</select>

<option value="이웅해">이웅해</option>
</select>
<label>구분:</label>

<label>상태:</label>
<select id="filterStatus" onchange="renderTaskList()">

<option value="완료">완료</option>
<option value="진행중">진행중</option>
<option value="지연">지연</option>
<option value="주의">주의</option>
<option value="미착수">미착수</option>
</select>
<label>우선순위:</label>
<select id="filterPriority" onchange="renderTaskList()">

<option value="1순위">1순위</option>
<option value="2순위">2순위</option>
<option value="3순위">3순위</option>
<option value="4순위">4순위</option>
</select>
</div>
<div class="tbl-wrap">
<table>
<thead>
<tr>
<th style="width:30px">No</th>
<th>구분</th>
<th style="min-width:250px;text-align:left">내용</th>
<th>담당자</th>
<th>우선순위</th>
<th>착수일</th>
<th>마감일</th>
<th>진척도</th>
<th>상태</th>
<th style="min-width:200px;text-align:left">상태 설명</th>
</tr>
</thead>
<tbody id="taskBody"></tbody>
</table>
</div>
</div>

<!-- TAB 2: KPI -->
<div class="panel" id="panel2">
<div class="grade-scale">
<div style="background:#2e7d32">S (100)</div>
<div style="background:#1565c0">A (90)</div>
<div style="background:#f57f17">B (80)</div>
<div style="background:#e65100">C (70)</div>
<div style="background:#c62828">D (60)</div>
</div>
<div id="kpiContainer"></div>
</div>

<!-- TAB 3: Weekly Report -->
<div class="panel" id="panel3">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
<button class="btn btn-primary" onclick="renderWeeklyReport()">보고서 생성</button>
<button class="btn btn-print" onclick="printReport()">인쇄 / PDF</button>
</div>
<div id="weeklyReport"></div>
</div>
</div>

<div class="footer">경영관리팀 업무관리 시스템 v1.0</div>

// UTILITY FUNCTIONS
// ============================================================
const TODAY = new Date();

function parseDate(str) {
  if (!str) return null;
  return new Date(str);
}

function formatDate(str) {
  if (!str) return '-';
  const d = new Date(str);
  return (d.getMonth()+1) + '/' + d.getDate();
}

function getTaskStatus(task) {
  if (task.progress === 100 || task.completionDate) return '완료';
  const dl = parseDate(task.deadline);
  if (dl) {
    const diffDays = (dl - TODAY) / (1000*60*60*24);
    if (diffDays < 0 && task.progress < 100 && !task.completionDate) return '지연';
    if (diffDays >= 0 && diffDays <= 3 && task.progress < 100) return '주의';
  }
  if (task.progress > 0) return '진행중';
  return '미착수';
}

function statusBadgeClass(status) {
  switch(status) {
    case '완료': return 'badge-done';
    case '진행중': return 'badge-prog';
    case '지연': return 'badge-late';
    case '주의': return 'badge-warn';
    default: return 'badge-todo';
  }
}

function priBadgeClass(pri) {
  switch(pri) {
    case '1순위': return 'badge-p1';
    case '2순위': return 'badge-p2';
    case '3순위': return 'badge-p3';
    default: return 'badge-p4';
  }
}

function progFillClass(p) {
  if (p >= 100) return 'pf-done';
  if (p >= 50) return 'pf-mid';
  if (p > 0) return 'pf-low';
  return 'pf-zero';
}

function getOwners(ownerStr) {
  return ownerStr.split(',').map(s => s.trim());
}

function filterTasks(month) {
  if (month === 'all') return taskData;
  return taskData.filter(t => t.month === parseInt(month));
}

// ============================================================
// TAB SWITCHING
// ============================================================
function showTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => {
    p.classList.toggle('active', i===idx);
    p.classList.remove('print-target');
  });
  if (idx === 0) renderDashboard();
  if (idx === 1) renderTaskList();
  if (idx === 2) renderKPI();
  if (idx === 3) renderWeeklyReport();
}

// ============================================================
// TAB 0: DASHBOARD
// ============================================================
function renderDashboard() {
  const month = document.getElementById('dashMonth').value;
  const tasks = filterTasks(month);
  const statuses = tasks.map(t => getTaskStatus(t));

  const total = tasks.length;
  const done = statuses.filter(s => s==='완료').length;
  const prog = statuses.filter(s => s==='진행중').length;
  const late = statuses.filter(s => s==='지연').length;
  const warn = statuses.filter(s => s==='주의').length;
  const todo = statuses.filter(s => s==='미착수').length;

  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="lb">총 업무</div><div class="vl">${total}</div></div>
    <div class="card green"><div class="lb">완료</div><div class="vl">${done}</div></div>
    <div class="card blue"><div class="lb">진행 중</div><div class="vl">${prog}</div></div>
    <div class="card red"><div class="lb">지연</div><div class="vl">${late}</div></div>
    <div class="card orange"><div class="lb">주의</div><div class="vl">${warn}</div></div>
  `;

  // Person workload chart
  const persons = ['최선아','송은정','이웅해'];
  let personHtml = '';
  persons.forEach(person => {
    const pTasks = tasks.filter(t => getOwners(t.owner).includes(person));
    const pStatuses = pTasks.map(t => getTaskStatus(t));
    const pDone = pStatuses.filter(s => s==='완료').length;
    const pProg = pStatuses.filter(s => s==='진행중').length;
    const pLate = pStatuses.filter(s => s==='지연').length;
    const pWarn = pStatuses.filter(s => s==='주의').length;
    const pTodo = pStatuses.filter(s => s==='미착수').length;
    const pTotal = pTasks.length;
    if (pTotal === 0) return;
    const maxBar = Math.max(...persons.map(p => tasks.filter(t => getOwners(t.owner).includes(p)).length), 1);
    const scale = 100 / maxBar;
    personHtml += `<div class="bar-row">
      <div class="bar-label">${person}</div>
      <div class="bar-track">
        ${pDone ? `<div class="bar-seg s-done" style="width:${pDone*scale}%">${pDone}</div>` : ''}
        ${pProg ? `<div class="bar-seg s-prog" style="width:${pProg*scale}%">${pProg}</div>` : ''}
        ${pLate ? `<div class="bar-seg s-late" style="width:${pLate*scale}%">${pLate}</div>` : ''}
        ${pWarn ? `<div class="bar-seg s-warn" style="width:${pWarn*scale}%">${pWarn}</div>` : ''}
        ${pTodo ? `<div class="bar-seg s-todo" style="width:${pTodo*scale}%">${pTodo}</div>` : ''}
      </div>
      <div class="bar-value">${pTotal}건</div>
    </div>`;
  });
  document.getElementById('personChart').innerHTML = personHtml;

  // Department pie chart
  const depts = [...new Set(tasks.map(t => t.dept))];
  const deptColors = ['#1a237e','#c62828','#2e7d32','#e65100','#6a1b9a','#00695c','#ef6c00','#283593'];
  const deptCounts = depts.map(d => tasks.filter(t => t.dept === d).length);
  const deptTotal = deptCounts.reduce((a,b) => a+b, 0);

  let conicParts = [];
  let cumPct = 0;
  depts.forEach((d, i) => {
    const pct = (deptCounts[i] / deptTotal) * 100;
    conicParts.push(`${deptColors[i % deptColors.length]} ${cumPct}% ${cumPct + pct}%`);
    cumPct += pct;
  });

  document.getElementById('deptPie').style.background = `conic-gradient(${conicParts.join(',')})`;
  document.getElementById('deptPie').innerHTML = '<div class="pie-center">구분별</div>';

  let legendHtml = '';
  depts.forEach((d, i) => {
    legendHtml += `<div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${deptColors[i % deptColors.length]}"></div>
      ${d} (${deptCounts[i]}건)
    </div>`;
  });
  document.getElementById('deptPieLegend').innerHTML = legendHtml;

  // Priority chart
  const priorities = ['1순위','2순위','3순위','4순위'];
  const priColors = ['#c62828','#e65100','#1565c0','#666'];
  let priHtml = '';
  const maxPri = Math.max(...priorities.map(p => tasks.filter(t => t.priority === p).length), 1);
  priorities.forEach((pri, i) => {
    const cnt = tasks.filter(t => t.priority === pri).length;
    if (cnt === 0) return;
    priHtml += `<div class="bar-row">
      <div class="bar-label">${pri}</div>
      <div class="bar-track">
        <div class="bar-seg" style="width:${(cnt/maxPri)*100}%;background:${priColors[i]}">${cnt}</div>
      </div>
      <div class="bar-value">${cnt}건</div>
    </div>`;
  });
  document.getElementById('priorityChart').innerHTML = priHtml;
}

// ============================================================
// TAB 1: TASK LIST
// ============================================================
let activePriDropdown = null;

function renderTaskList() {
  const month = document.getElementById('listMonth').value;
  const person = document.getElementById('filterPerson').value;
  const dept = document.getElementById('filterDept').value;
  const status = document.getElementById('filterStatus').value;
  const priority = document.getElementById('filterPriority').value;

  let tasks = filterTasks(month);
  if (person !== 'all') tasks = tasks.filter(t => getOwners(t.owner).includes(person));
  if (dept !== 'all') tasks = tasks.filter(t => t.dept === dept);
  if (status !== 'all') tasks = tasks.filter(t => getTaskStatus(t) === status);
  if (priority !== 'all') tasks = tasks.filter(t => t.priority === priority);

  // Sort by priority level then deadline proximity
  const priOrder = {'1순위':1,'2순위':2,'3순위':3,'4순위':4};
  tasks.sort((a,b) => {
    const pa = priOrder[a.priority] || 9;
    const pb = priOrder[b.priority] || 9;
    if (pa !== pb) return pa - pb;
    const da = parseDate(a.deadline);
    const db = parseDate(b.deadline);
    if (da && db) return da - db;
    return 0;
  });

  let html = '';
  tasks.forEach((t, i) => {
    const st = getTaskStatus(t);
    const idx = taskData.indexOf(t);
    html += `<tr>
      <td>${i+1}</td>
      <td>${t.dept}</td>
      <td class="left">${t.content}</td>
      <td>${t.owner}</td>
      <td>
        <span class="badge-pri ${priBadgeClass(t.priority)}" onclick="togglePriDropdown(event, ${idx})" id="pri-${idx}">
          ${t.priority}
        </span>
      </td>
      <td>${formatDate(t.start)}</td>
      <td>${formatDate(t.deadline)}</td>
      <td>
        <div class="prog-bar"><div class="prog-fill ${progFillClass(t.progress)}" style="width:${t.progress}%"></div></div>
        ${t.progress}%
      </td>
      <td><span class="badge-status ${statusBadgeClass(st)}">${st}</span></td>
      <td class="left">${t.statusDesc || '-'}</td>
    </tr>`;
  });
  document.getElementById('taskBody').innerHTML = html;
}

function togglePriDropdown(e, idx) {
  e.stopPropagation();
  closePriDropdown();
  const span = document.getElementById('pri-' + idx);
  const rect = span.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'pri-dropdown';
  dropdown.style.position = 'fixed';
  dropdown.style.top = (rect.bottom + 2) + 'px';
  dropdown.style.left = rect.left + 'px';

  ['1순위','2순위','3순위','4순위'].forEach(pri => {
    const d = document.createElement('div');
    d.textContent = pri;
    d.className = priBadgeClass(pri);
    d.onclick = function(ev) {
      ev.stopPropagation();
      taskData[idx].priority = pri;
      closePriDropdown();
      renderTaskList();
    };
    dropdown.appendChild(d);
  });
  document.body.appendChild(dropdown);
  activePriDropdown = dropdown;
}

function closePriDropdown() {
  if (activePriDropdown) {
    activePriDropdown.remove();
    activePriDropdown = null;
  }
}

document.addEventListener('click', closePriDropdown);

// ============================================================
// TAB 2: KPI
// ============================================================
function renderKPI() {
  let html = '';
  kpiData.forEach(kpi => {
    html += `<div class="kpi-card">
      <h3>${kpi.name}</h3>
      <div class="kpi-weight">가중치: ${kpi.weight}% | 마감: ${kpi.deadline || '-'}</div>
      <div class="kpi-meta">
        <div><dt>실행계획</dt><dd>${kpi.plan}</dd></div>
        <div><dt>측정 결과물</dt><dd>${kpi.measure}</dd></div>
      </div>
      <div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;margin-bottom:4px;color:#555">현재 진척도</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="flex:1;height:14px;background:#eee;border-radius:7px;overflow:hidden">
            <div style="height:100%;width:${kpi.currentProgress}%;background:linear-gradient(90deg,#1a237e,#42a5f5);border-radius:7px;transition:width .5s"></div>
          </div>
          <span style="font-weight:700;font-size:13px;color:#1a237e;min-width:40px">${kpi.currentProgress}%</span>
        </div>
      </div>
      <div class="kpi-steps">
        <h4>실행 단계</h4>
        <ul>${kpi.steps.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <table class="grade-table">
        <thead><tr><th>등급</th><th>점수</th><th>기준</th></tr></thead>
        <tbody>
          <tr><td class="grade-s">S</td><td>100</td><td style="text-align:left">${kpi.grades.S}</td></tr>
          <tr><td class="grade-a">A</td><td>90</td><td style="text-align:left">${kpi.grades.A}</td></tr>
          <tr><td class="grade-b">B</td><td>80</td><td style="text-align:left">${kpi.grades.B}</td></tr>
          <tr><td class="grade-c">C</td><td>70</td><td style="text-align:left">${kpi.grades.C}</td></tr>
          <tr><td class="grade-d">D</td><td>60</td><td style="text-align:left">${kpi.grades.D}</td></tr>
        </tbody>
      </table>
    </div>`;
  });
  document.getElementById('kpiContainer').innerHTML = html;
}

// ============================================================
// TAB 3: WEEKLY REPORT (CEO Briefing)
// ============================================================
function renderWeeklyReport() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1); // Monday
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 4); // Friday
  const nextWeekStart = new Date(weekStart);
  nextWeekStart.setDate(weekStart.getDate() + 7);
  const nextWeekEnd = new Date(nextWeekStart);
  nextWeekEnd.setDate(nextWeekStart.getDate() + 4);

  function fmtD(d) { return (d.getMonth()+1) + '/' + d.getDate(); }

  // Get all tasks and determine status
  const allTasks = taskData.map(t => ({...t, status: getTaskStatus(t)}));

  // Completed this week or recently
  const doneTasks = allTasks.filter(t => t.status === '완료');
  const inProgress = allTasks.filter(t => t.status === '진행중');
  const lateTasks = allTasks.filter(t => t.status === '지연');
  const warnTasks = allTasks.filter(t => t.status === '주의');
  const issuesTasks = [...lateTasks, ...warnTasks];

  // Next week plan: tasks with deadlines in the next 2 weeks
  const twoWeeksOut = new Date(now);
  twoWeeksOut.setDate(now.getDate() + 14);
  const upcomingTasks = allTasks.filter(t => {
    const dl = parseDate(t.deadline);
    return dl && dl >= now && dl <= twoWeeksOut && t.status !== '완료';
  });

  // Decisions needed
  const decisions = allTasks.filter(t => t.decision && t.status !== '완료');
  const meetings = allTasks.filter(t => t.meeting && t.status !== '완료');

  // Group by department
  const depts = [...new Set(taskData.map(t => t.dept))];

  let html = `
    <div class="report-section">
      <h3>CEO 주간 보고 - 경영관리팀</h3>
      <div class="report-date">보고 기간: ${fmtD(weekStart)} (월) ~ ${fmtD(nextWeekEnd)} (금) | 작성일: ${fmtD(now)}</div>
    </div>
  `;

  // Section 1: Completed tasks
  html += `<div class="report-section"><h3>완료 업무 (${doneTasks.length}건)</h3>`;
  depts.forEach(dept => {
    const deptDone = doneTasks.filter(t => t.dept === dept);
    if (deptDone.length === 0) return;
    html += `<h4>${dept}</h4>`;
    deptDone.forEach(t => {
      html += `<div class="report-item"><span class="badge-status badge-done">완료</span> ${t.content} <span style="color:#888;font-size:11px">(${t.owner}, 완료: ${formatDate(t.completionDate)})</span></div>`;
    });
  });
  html += '</div>';

  // Section 2: In progress
  html += `<div class="report-section"><h3>진행 중 업무 (${inProgress.length}건)</h3>`;
  depts.forEach(dept => {
    const deptProg = inProgress.filter(t => t.dept === dept);
    if (deptProg.length === 0) return;
    html += `<h4>${dept}</h4>`;
    deptProg.forEach(t => {
      html += `<div class="report-item"><span class="badge-status badge-prog">진행중</span> ${t.content} <span style="color:#888;font-size:11px">(${t.owner}, 진척: ${t.progress}%, 마감: ${formatDate(t.deadline)})</span></div>`;
    });
  });
  html += '</div>';

  // Section 3: Issues (late + warn)
  if (issuesTasks.length > 0) {
    html += `<div class="report-section"><h3>지연 / 이슈 업무 (${issuesTasks.length}건)</h3>`;
    depts.forEach(dept => {
      const deptIssue = issuesTasks.filter(t => t.dept === dept);
      if (deptIssue.length === 0) return;
      html += `<h4>${dept}</h4>`;
      deptIssue.forEach(t => {
        const st = t.status;
        html += `<div class="report-item"><span class="badge-status ${statusBadgeClass(st)}">${st}</span> ${t.content} <span style="color:#888;font-size:11px">(${t.owner}, 진척: ${t.progress}%, 마감: ${formatDate(t.deadline)})</span>
        ${t.statusDesc ? `<br><span style="color:#e65100;font-size:11px">→ ${t.statusDesc}</span>` : ''}
        </div>`;
      });
    });
    html += '</div>';
  }

  // Section 4: Decisions needed
  if (decisions.length > 0) {
    html += `<div class="report-section"><h3>결정 필요 사항 (${decisions.length}건)</h3>`;
    decisions.forEach(t => {
      html += `<div class="report-highlight"><strong>${t.dept}</strong> - ${t.content}<br><span style="color:#c62828">결정사항: ${t.decision}</span> <span style="color:#888;font-size:11px">(담당: ${t.owner})</span></div>`;
    });
    html += '</div>';
  }

  // Section 5: Meetings
  if (meetings.length > 0) {
    html += `<div class="report-section"><h3>미팅 요청 (${meetings.length}건)</h3>`;
    meetings.forEach(t => {
      html += `<div class="report-item"><strong>${t.dept}</strong> - ${t.content}: <span style="color:#1a237e;font-weight:600">${t.meeting}</span></div>`;
    });
    html += '</div>';
  }

  // Section 6: Next 2 weeks plan
  html += `<div class="report-section"><h3>향후 2주 계획 (${upcomingTasks.length}건)</h3>`;
  depts.forEach(dept => {
    const deptUp = upcomingTasks.filter(t => t.dept === dept);
    if (deptUp.length === 0) return;
    html += `<h4>${dept}</h4>`;
    deptUp.forEach(t => {
      const st = getTaskStatus(t);
      html += `<div class="report-item"><span class="badge-status ${statusBadgeClass(st)}">${st}</span> ${t.content} <span style="color:#888;font-size:11px">(${t.owner}, 마감: ${formatDate(t.deadline)}, 진척: ${t.progress}%)</span></div>`;
    });
  });
  html += '</div>';

  document.getElementById('weeklyReport').innerHTML = html;
}

function printReport() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('print-target'));
  document.getElementById('panel3').classList.add('print-target');
  window.print();
}

// ============================================================
// INIT
// ============================================================
function init() {
  // Populate dept filter
  const depts = [...new Set(taskData.map(t => t.dept))];
  const sel = document.getElementById('filterDept');
  sel.innerHTML = '<option value="all">전체</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');

  renderDashboard();
}

init();
</script>
