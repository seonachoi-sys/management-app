// ═══ HELPERS ═══
function fmt(n){return n.toLocaleString('ko-KR')}
function getData(p,yr){return yr===2026?p.y2026:p.y2027}
function getProjects(yr){return yr===2026?P2026:P2027}
// ── 실제 급여명세 기반 월 기본급: index 0=1월, 1=2월, 그 외 연봉/12 ──
function getMonthlyBase(name, mi, annualSalary) {
  const pd = payrollData[name];
  if (pd && pd[mi] !== undefined) return pd[mi].b;
  return annualSalary ? Math.round(annualSalary / 12) : 0;
}
function getIns(p){
  if(!p.ins||!p.salary)return{pension:0,health:0,ltcare:0,employ:0,accident:0,total:0};
  const i=p.ins;
  const accident=accidentMap[p.name]??0;
  return{pension:i.p,health:i.h,ltcare:i.c,employ:i.e,accident,total:i.p+i.h+i.c+i.e+accident};
}
function monthlyCost(p,mi){const ms=getMonthlyBase(p.name,mi??0,p.salary);return ms?ms+getIns(p).total:0;}

// ═══ UI ═══
function showDoc(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===idx)});
  document.querySelectorAll('.preview').forEach((p,i)=>{p.classList.toggle('active',i===idx)});
}

function init(){
  const sp=document.getElementById('selProject');
  const allP=[...new Set([...P2026,...P2027])];
  allP.forEach(pj=>{sp.innerHTML+=`<option value="${pj}">${pj}</option>`});
  const sm=document.getElementById('selMonth');
  MONTHS.forEach((m,i)=>{sm.innerHTML+=`<option value="${i}">${m}</option>`});
  updatePreview();
}

function updatePreview(){
  const projName=document.getElementById('selProject').value;
  const yr=+document.getElementById('selYear').value;
  const mi=+document.getElementById('selMonth').value;
  const pm=projectMaster[projName];
  if(!pm)return;
  const period=pm.periods[yr];

  // Filter participants for this project+month
  const participants=[];
  people.forEach(p=>{
    const d=getData(p,yr);
    const pd=d[projName];
    if(!pd||pd.m[mi]===0)return;
    participants.push({person:p,pd,rate:pd.m[mi]});
  });

  renderParticipation(projName,pm,period,yr,mi,participants);
  renderPayslip(projName,pm,yr,mi,participants);
}

// ═══ 참여현황표 ═══
function renderParticipation(projName,pm,period,yr,mi,participants){
  const yrStr=yr+'년';
  const monthStr=MONTHS[mi];
  const periodStr=period?`${period.start} ~ ${period.end}`:'';

  let html=`<div class="doc">
  <div class="doc-title">연구개발과제 참여현황표(${yrStr} ${monthStr})</div>
  <div class="doc-subtitle">${projName}</div>

  <div class="doc-section">1. 연구개발과제 정보</div>
  <table class="info-table">
  <tr><th>과 제 명</th><td colspan="5" class="left">${pm.full}</td></tr>
  <tr><th>세부과제명</th><td colspan="5" class="left">${pm.sub||''}</td></tr>
  <tr><th>수 행 기 간</th><td colspan="2" class="left">${periodStr}</td><th>수행기관</th><td colspan="2" class="left">${pm.org}</td></tr>
  <tr><th>전문기관</th><td colspan="2" class="left">${pm.agency}</td><th>책임자</th><td colspan="2" class="left">${pm.pi}</td></tr>
  </table>

  <div class="doc-section">2. 인건비 내역 (${yrStr} ${monthStr})</div>
  <table>
  <thead>
  <tr><th rowspan="2">성명</th><th rowspan="2">직책</th><th colspan="2">참여기간</th><th rowspan="2">월 급여(A)</th><th rowspan="2">4대보험<br>기업부담(B)</th><th rowspan="2">참여율</th><th colspan="3">인건비 ((A+B)×참여율)</th></tr>
  <tr><th>시작</th><th>종료</th><th>현금</th><th>현물</th><th>합계</th></tr>
  </thead><tbody>`;

  let sumCash=0,sumKind=0,sumTotal=0;
  participants.forEach(({person:p,pd,rate})=>{
    const ms=getMonthlyBase(p.name,mi,p.salary);
    const ins=getIns(p);
    const cost=Math.round((ms+ins.total)*rate/100);
    const isCash=pd.t==='현금';
    const isKind=pd.t==='현물';
    const cash=isCash?cost:0;
    const kind=isKind?cost:0;
    sumCash+=cash;sumKind+=kind;sumTotal+=cost;
    const pStart=period?period.start:'';
    const pEnd=period?period.end:'';
    html+=`<tr>
      <td>${p.name}</td><td>${posMap[p.name]||''}</td>
      <td>${pStart}</td><td>${pEnd}</td>
      <td class="right">${fmt(Math.round(ms))}</td>
      <td class="right">${fmt(ins.total)}</td>
      <td>${rate}%</td>
      <td class="right">${cash?fmt(cash):'-'}</td>
      <td class="right">${kind?fmt(kind):'-'}</td>
      <td class="right">${fmt(cost)}</td>
    </tr>`;
  });
  html+=`<tr class="total-row"><td colspan="7">합 계</td>
    <td class="right">${fmt(sumCash)}</td><td class="right">${fmt(sumKind)}</td><td class="right">${fmt(sumTotal)}</td></tr>`;
  html+=`</tbody></table>`;

  // 상세 4대보험 내역
  html+=`<div class="doc-section">3. 4대보험 기업부담 상세</div>
  <table>
  <thead><tr><th>성명</th><th>직책</th><th>월 급여(A)</th><th>국민연금</th><th>건강보험</th><th>장기요양</th><th>고용보험</th><th>산재보험</th><th>보험합계(B)</th><th>합계(A+B)</th></tr></thead><tbody>`;

  let tSalary=0,tPen=0,tHea=0,tLtc=0,tEmp=0,tAcc=0,tIns=0,tAll=0;
  participants.forEach(({person:p})=>{
    const ms=p.salary/12;
    const ins=getIns(p);
    const total=ms+ins.total;
    tSalary+=ms;tPen+=ins.pension;tHea+=ins.health;tLtc+=ins.ltcare;tEmp+=ins.employ;tAcc+=ins.accident;tIns+=ins.total;tAll+=total;
    html+=`<tr><td>${p.name}</td><td>${posMap[p.name]||''}</td>
      <td class="right">${fmt(Math.round(ms))}</td>
      <td class="right">${fmt(ins.pension)}</td>
      <td class="right">${fmt(ins.health)}</td>
      <td class="right">${fmt(ins.ltcare)}</td>
      <td class="right">${fmt(ins.employ)}</td>
      <td class="right">${ins.accident?fmt(ins.accident):'-'}</td>
      <td class="right">${fmt(ins.total)}</td>
      <td class="right">${fmt(Math.round(total))}</td></tr>`;
  });
  html+=`<tr class="total-row"><td colspan="2">합 계</td>
    <td class="right">${fmt(Math.round(tSalary))}</td>
    <td class="right">${fmt(tPen)}</td><td class="right">${fmt(tHea)}</td>
    <td class="right">${fmt(tLtc)}</td><td class="right">${fmt(tEmp)}</td>
    <td class="right">${fmt(tAcc)}</td><td class="right">${fmt(tIns)}</td>
    <td class="right">${fmt(Math.round(tAll))}</td></tr>`;
  html+=`</tbody></table>`;

  html+=`<div class="note">
  * 월 급여 = 연봉 &divide; 12 (휴일·연장·야간 근로수당 제외)<br>
  * 4대보험 기업부담: 국민연금·건강보험·장기요양 = 실제 금액 / 고용보험 = 급여대장 기준 / 산재보험 = 추정치<br>
  * 이사(임원): 고용보험·산재보험 미가입
  </div>`;

  html+=`</div>`;
  document.getElementById('doc0').innerHTML=html;
}

// ═══ 급여명세서 ═══
function renderPayslip(projName,pm,yr,mi,participants){
  const yrStr=yr+'년';
  const monthStr=MONTHS[mi];

  let html=`<div class="doc page-break">
  <div class="doc-title">${yrStr} ${monthStr}  급여명세서</div>
  <div class="doc-subtitle" style="margin-bottom:4px">${projName} 과제 참여 인력</div>
  <div class="doc-company" style="text-align:center;margin-bottom:16px">(주)타이로스코프</div>

  <table>
  <thead>
  <tr>
    <th rowspan="2">NO</th><th rowspan="2">성명</th>
    <th colspan="2">지 급 내 역</th>
    <th rowspan="2">지급합계</th>
    <th colspan="5">공 제 내 역 (기업부담)</th>
    <th rowspan="2">공제합계</th>
    <th rowspan="2">총 인건비<br>(지급+공제)</th>
  </tr>
  <tr>
    <th>기본급<br>(연봉/12)</th><th>상여금 등<br>추가분</th>
    <th>국민연금</th><th>건강보험</th><th>장기요양</th><th>고용보험</th><th>산재보험</th>
  </tr>
  </thead><tbody>`;

  let no=0;
  let tBase=0,tBonus=0,tPay=0,tPen=0,tHea=0,tLtc=0,tEmp=0,tAcc=0,tDed=0,tAll=0;

  participants.forEach(({person:p,pd,rate})=>{
    if(!p.salary)return;
    no++;
    const ms=getMonthlyBase(p.name,mi,p.salary);
    const ins=getIns(p);
    const bonus=0; // 상여금 추가분 없음
    const payTotal=ms+bonus;
    const dedTotal=ins.total;
    const grandTotal=payTotal+dedTotal;
    tBase+=ms;tBonus+=bonus;tPay+=payTotal;
    tPen+=ins.pension;tHea+=ins.health;tLtc+=ins.ltcare;tEmp+=ins.employ;tAcc+=ins.accident;
    tDed+=dedTotal;tAll+=grandTotal;

    html+=`<tr>
      <td>${no}</td><td>${p.name}</td>
      <td class="right">${fmt(ms)}</td>
      <td class="right">${bonus?fmt(bonus):'-'}</td>
      <td class="right">${fmt(payTotal)}</td>
      <td class="right">${ins.pension?fmt(ins.pension):'-'}</td>
      <td class="right">${fmt(ins.health)}</td>
      <td class="right">${fmt(ins.ltcare)}</td>
      <td class="right">${ins.employ?fmt(ins.employ):'-'}</td>
      <td class="right">${ins.accident?fmt(ins.accident):'-'}</td>
      <td class="right">${fmt(dedTotal)}</td>
      <td class="right">${fmt(grandTotal)}</td>
    </tr>`;
  });

  html+=`<tr class="total-row">
    <td colspan="2">합 계 (${no}명)</td>
    <td class="right">${fmt(tBase)}</td><td class="right">${tBonus?fmt(tBonus):'-'}</td>
    <td class="right">${fmt(tPay)}</td>
    <td class="right">${fmt(tPen)}</td><td class="right">${fmt(tHea)}</td>
    <td class="right">${fmt(tLtc)}</td><td class="right">${fmt(tEmp)}</td>
    <td class="right">${fmt(tAcc)}</td><td class="right">${fmt(tDed)}</td>
    <td class="right">${fmt(tAll)}</td>
  </tr>`;
  html+=`</tbody></table>`;

  html+=`<div class="note" style="margin-top:16px">
  * 기본급 = 연봉 &divide; 12 (휴일·연장·야간 근로수당, 식대, 자가운전보조금 등 제외)<br>
  * 4대보험: 기업부담분만 표기 (국민연금·건강보험·장기요양 = 실제 금액 / 산재보험 = 추정치)<br>
  * 이사(임원): 고용보험·산재보험 미가입 / 문재훈: 겸직(건강+요양만 가입)<br>
  * 소속 부서 미표기 (과제 증빙용)
  </div>`;

  html+=`</div>`;
  document.getElementById('doc1').innerHTML=html;
}
